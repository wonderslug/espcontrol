name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-firmware:
    name: Build ${{ matrix.slug }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: guition-esp32-p4-jc1060p470
            slug: guition-esp32-p4-jc1060p470
            chip: ESP32-P4
          - device: guition-esp32-p4-jc8012p4a1
            slug: guition-esp32-p4-jc8012p4a1
            chip: ESP32-P4
          - device: guition-esp32-p4-jc4880p443
            slug: guition-esp32-p4-jc4880p443
            chip: ESP32-P4
          - device: esp32-p4-86
            slug: esp32-p4-86
            chip: ESP32-P4
          - device: guition-esp32-s3-4848s040
            slug: guition-esp32-s3-4848s040
            chip: ESP32-S3
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - name: Select Docker command
        run: |
          if docker info >/dev/null 2>&1; then
            echo "DOCKER=docker" >> "$GITHUB_ENV"
          elif sudo -n docker info >/dev/null 2>&1; then
            echo "DOCKER=sudo docker" >> "$GITHUB_ENV"
          else
            echo "::error::Docker is not available to the self-hosted runner user"
            exit 1
          fi

      - name: Prepare local ESPHome cache
        run: |
          CACHE_ROOT="${HOME}/.cache/espcontrol-actions/esphome"
          PLATFORMIO_CACHE="${CACHE_ROOT}/shared"
          BUILD_CACHE="${CACHE_ROOT}/release/${{ matrix.slug }}"
          mkdir -p "${PLATFORMIO_CACHE}" "${BUILD_CACHE}" builds
          rm -rf .esphome
          rm -rf builds/.esphome
          ln -s "${PLATFORMIO_CACHE}" .esphome
          ln -s "${BUILD_CACHE}" builds/.esphome

      - name: Compile firmware
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: >-
          ${DOCKER} run --rm
          --user "$(id -u):$(id -g)"
          -e HOME=/config
          -e PLATFORMIO_CORE_DIR=/config/.esphome/platformio
          -e PLATFORMIO_SETTING_ENABLE_TELEMETRY=false
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.3
          -s firmware_version "${VERSION}"
          compile /config/builds/${{ matrix.slug }}.factory.yaml

      - name: Collect firmware files and generate manifest
        id: firmware
        run: |
          BUILD_DIR=$(dirname "$(find .esphome/build builds/.esphome/build -name firmware.factory.bin -print -quit 2>/dev/null)")
          mkdir -p output

          if [ ! -f "${BUILD_DIR}/firmware.factory.bin" ]; then
            echo "::error::Firmware compilation failed — factory binary not found"
            exit 1
          fi

          cp "${BUILD_DIR}/firmware.factory.bin" output/${{ matrix.slug }}.factory.bin
          cp "${BUILD_DIR}/firmware.bin" output/${{ matrix.slug }}.ota.bin

          OTA_MD5=$(md5sum output/${{ matrix.slug }}.ota.bin | cut -d ' ' -f 1)
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"

          cat > output/${{ matrix.slug }}.manifest.json << EOF
          {
            "name": "Espcontrol",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "builds": [
              {
                "chipFamily": "${{ matrix.chip }}",
                "parts": [
                  { "path": "${{ matrix.slug }}.factory.bin", "offset": 0 }
                ],
                "ota": {
                  "path": "${{ matrix.slug }}.ota.bin",
                  "md5": "${OTA_MD5}",
                  "release_url": "https://github.com/jtenniswood/espcontrol/releases/tag/${VERSION}"
                }
              }
            ]
          }
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.slug }}
          path: output/

  publish:
    name: Publish to Release
    if: github.event_name == 'release'
    needs: build-firmware
    runs-on: self-hosted
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true
          path: firmware

      - name: Upload firmware to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ github.event.release.id }}
        run: |
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          UPLOAD_URL="https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets"
          ASSET_API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets"
          ASSETS_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}/assets")

          for FILE in firmware/*; do
            NAME=$(basename "${FILE}")
            EXISTING_ID=$(printf '%s' "${ASSETS_JSON}" | jq -r --arg name "${NAME}" \
              '.[] | select(.name == $name) | .id' | head -n 1)
            if [ -n "${EXISTING_ID}" ]; then
              curl -fsSL \
                -X DELETE \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${ASSET_API_URL}/${EXISTING_ID}"
            fi

            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${FILE}" \
              "${UPLOAD_URL}?name=${NAME}" \
              -o /dev/null
          done
