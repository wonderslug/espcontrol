name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docs:
    name: Build Docs
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/.vitepress/dist

  download-firmware:
    name: Download Firmware
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: src/webserver/devices.json
          sparse-checkout-cone-mode: false

      - name: Set device slugs
        run: echo "DEVICE_SLUGS=$(jq -r 'keys | join(" ")' src/webserver/devices.json)" >> $GITHUB_ENV

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for SLUG in $DEVICE_SLUGS; do
            (
              mkdir -p "firmware/${SLUG}"
              gh release download \
                --pattern "${SLUG}.manifest.json" \
                --pattern "${SLUG}.factory.bin" \
                --pattern "${SLUG}.ota.bin" \
                --dir "firmware/${SLUG}/" || true
              if [ -f "firmware/${SLUG}/${SLUG}.manifest.json" ]; then
                mv "firmware/${SLUG}/${SLUG}.manifest.json" \
                   "firmware/${SLUG}/manifest.json"
              fi
            ) &
          done
          wait

      - name: Download firmware from latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          BETA_TAG=$(gh release list --limit 20 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[0].tagName // empty')
          if [ -n "$BETA_TAG" ]; then
            for SLUG in $DEVICE_SLUGS; do
              (
                mkdir -p "firmware/${SLUG}/beta"
                gh release download "$BETA_TAG" \
                  --pattern "${SLUG}.manifest.json" \
                  --pattern "${SLUG}.ota.bin" \
                  --dir "firmware/${SLUG}/beta/" || true
                if [ -f "firmware/${SLUG}/beta/${SLUG}.manifest.json" ]; then
                  mv "firmware/${SLUG}/beta/${SLUG}.manifest.json" \
                     "firmware/${SLUG}/beta/manifest.json"
                fi
              ) &
            done
            wait
          fi

      - name: Verify firmware assets
        run: |
          MISSING=false
          for SLUG in $DEVICE_SLUGS; do
            MANIFEST="firmware/${SLUG}/manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              echo "::error::No firmware manifest found for ${SLUG} — install page will be non-functional"
              MISSING=true
            fi
          done
          if [ "$MISSING" = true ]; then exit 1; fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: firmware/

  deploy:
    name: Deploy to Pages
    needs: [build-docs, download-firmware]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v7
        with:
          name: docs-dist
          path: dist

      - name: Download firmware artifact
        uses: actions/download-artifact@v7
        with:
          name: firmware
          path: dist/firmware

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
