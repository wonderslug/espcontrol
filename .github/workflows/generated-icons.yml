name: Update Generated Icons

on:
  push:
    branches: [main]
    paths:
      - 'common/assets/icons.json'
      - 'scripts/build.py'
      - '.github/workflows/generated-icons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-icons:
    name: Sync generated icon files
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - name: Generate icon outputs
        run: python3 scripts/build.py icons

      - name: Commit generated icon outputs
        run: |
          if git diff --quiet; then
            echo "Generated icon files are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            common/assets/icon_glyphs.yaml \
            components/espcontrol/icons.h \
            src/webserver/www.js
          git commit -m "Build generated icon files"
          git push
