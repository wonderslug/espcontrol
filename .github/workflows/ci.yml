name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Generated Files
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          mkdir -p "${HOME}/.cache/espcontrol-actions/npm"
          npm ci --prefer-offline --cache "${HOME}/.cache/espcontrol-actions/npm"

      - run: python3 scripts/build.py --check
      - run: python3 scripts/generate_device_slots.py --check
      - run: python3 scripts/check_icon_groups.py
      - run: npm run check:config

  docs:
    name: Build Docs
    runs-on: self-hosted
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          mkdir -p "${HOME}/.cache/espcontrol-actions/npm"
          npm ci --prefer-offline --cache "${HOME}/.cache/espcontrol-actions/npm"

      - run: npm run docs:build

  compile:
    name: Compile Firmware (${{ matrix.slug }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        slug:
          - guition-esp32-p4-jc1060p470
          - guition-esp32-p4-jc4880p443
          - guition-esp32-p4-jc8012p4a1
          - esp32-p4-86
          - guition-esp32-s3-4848s040
    steps:
      - name: Prepare self-hosted workspace
        run: rm -rf "${GITHUB_WORKSPACE}/.esphome" || sudo rm -rf "${GITHUB_WORKSPACE}/.esphome"

      - uses: actions/checkout@v6
      - run: git sparse-checkout disable || true

      - name: Select Docker command
        run: |
          if docker info >/dev/null 2>&1; then
            echo "DOCKER=docker" >> "$GITHUB_ENV"
          elif sudo -n docker info >/dev/null 2>&1; then
            echo "DOCKER=sudo docker" >> "$GITHUB_ENV"
          else
            echo "::error::Docker is not available to the self-hosted runner user"
            exit 1
          fi

      - name: Prepare local ESPHome cache
        run: |
          CACHE_ROOT="${HOME}/.cache/espcontrol-actions/esphome"
          PLATFORMIO_CACHE="${CACHE_ROOT}/shared"
          BUILD_CACHE="${CACHE_ROOT}/ci/${{ matrix.slug }}"
          mkdir -p "${PLATFORMIO_CACHE}" "${BUILD_CACHE}" builds
          rm -rf .esphome
          rm -rf builds/.esphome
          ln -s "${PLATFORMIO_CACHE}" .esphome
          ln -s "${BUILD_CACHE}" builds/.esphome

      - name: Compile firmware
        run: >-
          ${DOCKER} run --rm
          --user "$(id -u):$(id -g)"
          -e HOME=/config
          -e PLATFORMIO_CORE_DIR=/config/.esphome/platformio
          -e PLATFORMIO_SETTING_ENABLE_TELEMETRY=false
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.3
          compile /config/builds/${{ matrix.slug }}.factory.yaml
