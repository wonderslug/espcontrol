name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'common/**'
      - 'components/**'
      - 'devices/**'
      - 'builds/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Generated Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: python3 scripts/build.py --check
      - run: python3 scripts/check_icon_groups.py
      - run: npm run check:config

  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run docs:build

  compile:
    name: Compile Firmware (${{ matrix.slug }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug:
          - guition-esp32-p4-jc1060p470
          - guition-esp32-p4-jc4880p443
          - guition-esp32-p4-jc8012p4a1
          - guition-esp32-s3-4848s040
    steps:
      - uses: actions/checkout@v6

      - name: Cache ESPHome build
        uses: actions/cache@v5
        with:
          path: builds/.esphome
          key: esphome-ci-${{ matrix.slug }}-${{ hashFiles('builds/*.yaml', 'common/**', 'devices/**', 'components/**') }}
          restore-keys: |
            esphome-ci-${{ matrix.slug }}-

      - name: Compile firmware
        run: >-
          docker run --rm -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.0
          compile /config/builds/${{ matrix.slug }}.factory.yaml
