# =============================================================================
# CONNECTIVITY - WiFi, captive portal, page navigation
# =============================================================================
# Handles network connectivity and navigates between screens based on
# connection state using lvgl.page.show.
#
# Screen flow (initial setup):
#   loading → wifi_setup   (if no WiFi)
#           → ha_setup     (if WiFi OK but HA not connected)
#           → ha_actions   (allow device to perform HA actions)
#           → button_setup (if no buttons configured)
#           → main_page
# On reboot (buttons already configured):
#   loading → main_page    (skips setup screens)
# =============================================================================

esphome:
  on_boot:
    priority: 600
    then:
      - lambda: |-
          std::string mac = get_mac_address();
          wifi::WiFiAP ap;
          ap.set_ssid("ESP_" + mac.substr(8));
          wifi::global_wifi_component->set_ap(ap);

captive_portal:

improv_serial:

wifi:
  reboot_timeout: 0s
  ap:
    # Keep the setup hotspot available while the WiFi setup screen is shown.
    ap_timeout: 0s
  on_connect:
    - script.stop: setup_screen_dim
    - lambda: |-
        ESP_LOGI("connectivity", "WiFi connected (%lu ms)", millis());
        lv_label_set_text(id(loading_status_label), "Connected");
    - delay: 200ms
    - if:
        condition:
          api.connected:
        then:
          - script.execute: navigate_after_api
        else:
          - if:
              condition:
                lambda: 'return id(button_order).state.empty();'
              then:
                - lvgl.page.show: ha_setup_page
                - script.execute: setup_screen_dim
  on_disconnect:
    - if:
        condition:
          lambda: 'return !id(boot_grace_period);'
        then:
          - lvgl.widget.update:
              id: temperatures
              hidden: true
          - lvgl.widget.update:
              id: display_time
              hidden: true
          - lvgl.page.show: wifi_setup_page
          - script.execute: setup_screen_dim

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return lv_scr_act() == id(ha_setup_page)->obj;'
        then:
          - script.stop: setup_screen_dim
          - lvgl.page.show: ha_actions_page
        else:
          - script.execute: navigate_after_api

script:
  - id: navigate_after_api
    mode: restart
    then:
      - script.stop: setup_screen_dim
      - if:
          condition:
            lambda: 'return !id(button_order).state.empty();'
          then:
            - lvgl.page.show: main_page
            - if:
                condition:
                  switch.is_on: clock_bar_enabled
                then:
                  - if:
                      condition:
                        or:
                          - switch.is_on: indoor_temp_enable
                          - switch.is_on: outdoor_temp_enable
                      then:
                        - lvgl.widget.update:
                            id: temperatures
                            hidden: false
                  - lvgl.widget.update:
                      id: display_time
                      hidden: false
                else:
                  - lvgl.widget.update:
                      id: temperatures
                      hidden: true
                  - lvgl.widget.update:
                      id: display_time
                      hidden: true
            - script.execute: screensaver_idle_check
          else:
            - lambda: |-
                auto ips = wifi::global_wifi_component->get_ip_addresses();
                if (!ips.empty()) {
                  char ip_buf[esphome::network::IP_ADDRESS_BUFFER_SIZE];
                  ips[0].str_to(ip_buf);
                  std::string url = "http://" + std::string(ip_buf);
                  lv_label_set_text(id(setup_ip_label), url.c_str());
                }
            - lvgl.page.show: button_setup_page
            - script.execute: setup_screen_dim
