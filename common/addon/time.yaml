# =============================================================================
# TIME - Home Assistant time source and timezone selector
# =============================================================================
# HA time drives the on-screen clock. The timezone selector provides
# approximate lat/lon for on-device sunrise/sunset calculation (sun_calc.h).
# =============================================================================

esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          const char *posix = apply_timezone(id(timezone_select).current_option());
          id(ha_time).set_timezone(posix);

