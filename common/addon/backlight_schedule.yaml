# =============================================================================
# BACKLIGHT SCHEDULE - Day/Night Brightness via On-Device Sun Calculation
# =============================================================================
# Automatic day/night brightness using sunrise/sunset times calculated
# on-device from the user's timezone (sun_calc.h). No Home Assistant
# sun entity dependency — works fully standalone.
# =============================================================================

globals:
  - id: last_is_daytime
    type: bool
    initial_value: 'true'
  - id: sunrise_hour
    type: int
    initial_value: '6'
  - id: sunrise_minute
    type: int
    initial_value: '0'
  - id: sunset_hour
    type: int
    initial_value: '18'
  - id: sunset_minute
    type: int
    initial_value: '0'
  - id: sunrise_sunset_valid
    type: bool
    initial_value: 'false'

# =============================================================================
# SUNRISE / SUNSET DISPLAY
# =============================================================================

text_sensor:
  - platform: template
    name: "Screen: Sunrise"
    id: sunrise_time_sensor
    entity_category: diagnostic
    internal: true
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_brightness

  - platform: template
    name: "Screen: Sunset"
    id: sunset_time_sensor
    entity_category: diagnostic
    internal: true
    icon: "mdi:weather-sunset-down"
    web_server:
      sorting_group_id: sg_brightness

# =============================================================================
# USER-CONFIGURABLE ENTITIES
# =============================================================================

switch:
  - platform: template
    name: "Screen: Schedule Enabled"
    id: schedule_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_brightness
    on_turn_on:
      - script.execute: screen_schedule_check
    on_turn_off:
      - globals.set:
          id: backlight_manual_off
          value: 'false'
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - if:
          condition:
            lambda: 'return id(screen_schedule_asleep);'
          then:
            - script.execute: screen_schedule_wake
          else:
            - script.execute: backlight_apply_brightness

number:
  - platform: template
    name: "Screen: Schedule On Hour"
    id: schedule_on_hour
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6
    optimistic: true
    restore_value: true
    entity_category: config
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "Screen: Schedule Off Hour"
    id: schedule_off_hour
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 23
    optimistic: true
    restore_value: true
    entity_category: config
    icon: "mdi:weather-night"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "Screen: Daytime Brightness"
    id: brightness_day
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: template
    name: "Screen: Nighttime Brightness"
    id: brightness_night
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_brightness
    on_value:
      then:
        - script.execute: backlight_apply_brightness

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # ---------------------------------------------------------------------------
  # Force the screen asleep because it is outside schedule hours
  # ---------------------------------------------------------------------------
  - id: screen_schedule_sleep
    mode: restart
    then:
      - script.stop: screensaver_idle_check
      - script.stop: home_screen_idle_check
      - globals.set:
          id: display_asleep
          value: 'true'
      - globals.set:
          id: screensaver_display_off_active
          value: 'true'
      - globals.set:
          id: screen_schedule_asleep
          value: 'true'
      - globals.set:
          id: backlight_manual_off
          value: 'false'
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - script.execute: backlight_sleep_display_off

  # ---------------------------------------------------------------------------
  # Wake automatically at the start of the schedule window
  # ---------------------------------------------------------------------------
  - id: screen_schedule_wake
    mode: restart
    then:
      - globals.set:
          id: screen_schedule_asleep
          value: 'false'
      - globals.set:
          id: screensaver_display_off_active
          value: 'false'
      - globals.set:
          id: backlight_manual_off
          value: 'false'
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - lvgl.resume:
      - script.execute: hide_clock_view
      - delay: 100ms
      - globals.set:
          id: display_asleep
          value: 'false'
      - script.execute: backlight_apply_brightness
      - script.execute: screensaver_idle_check
      - script.execute: home_screen_idle_check

  # ---------------------------------------------------------------------------
  # Apply the saved screen schedule if local time is valid
  # ---------------------------------------------------------------------------
  - id: screen_schedule_check
    mode: restart
    then:
      - lambda: |-
          if (!id(schedule_enabled).state) return;

          auto now = id(ha_time).now();
          if (!now.is_valid()) return;

          int on_hour = (int) id(schedule_on_hour).state;
          int off_hour = (int) id(schedule_off_hour).state;
          if (on_hour < 0) on_hour = 0;
          if (on_hour > 23) on_hour = 23;
          if (off_hour < 0) off_hour = 0;
          if (off_hour > 23) off_hour = 23;
          bool in_window = true;
          if (on_hour < off_hour) {
            in_window = now.hour >= on_hour && now.hour < off_hour;
          } else if (on_hour > off_hour) {
            in_window = now.hour >= on_hour || now.hour < off_hour;
          }

          if (in_window) {
            id(manual_wake_ms) = 0;
            if (id(display_asleep) && id(screen_schedule_asleep) &&
                !id(backlight_manual_off)) {
              id(screen_schedule_wake).execute();
            }
            return;
          }

          if (id(manual_wake_ms) != 0) {
            uint32_t elapsed = (uint32_t) (millis() - id(manual_wake_ms));
            if (elapsed < 120000UL) return;
            id(manual_wake_ms) = 0;
          }

          if (!id(screen_schedule_asleep)) {
            id(screen_schedule_sleep).execute();
          }

  # ---------------------------------------------------------------------------
  # Determine correct brightness and apply it
  # ---------------------------------------------------------------------------
  - id: backlight_apply_brightness
    mode: restart
    then:
      - lambda: |-
          if (id(display_asleep)) return;
          auto now = id(ha_time).now();
          bool is_day = id(last_is_daytime);
          float pct = calc_brightness_pct(
            id(sunrise_sunset_valid), id(sunrise_hour), id(sunrise_minute),
            id(sunset_hour), id(sunset_minute),
            now.is_valid() ? now.hour : 12, now.is_valid() ? now.minute : 0,
            &is_day, id(brightness_day).state, id(brightness_night).state);
          id(last_is_daytime) = is_day;
          auto call = id(display_backlight).turn_on();
          call.set_brightness(pct / 100.0f);
          call.set_transition_length(500);
          call.perform();

  # ---------------------------------------------------------------------------
  # Recalculate sunrise/sunset from timezone coordinates and current date
  # ---------------------------------------------------------------------------
  - id: backlight_recalc_sunrise_sunset
    mode: single
    then:
      - lambda: |-
          apply_timezone(id(timezone_select).current_option());
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;
          bool use_12h = id(clock_format_select).current_option() == "12h";
          auto r = recalc_sunrise_sunset(now.year, now.month, now.day_of_month,
                                         id(timezone_select).current_option(),
                                         use_12h);
          id(sunrise_hour) = r.rise_h;
          id(sunrise_minute) = r.rise_m;
          id(sunset_hour) = r.set_h;
          id(sunset_minute) = r.set_m;
          id(sunrise_sunset_valid) = r.valid;
          if (r.valid) {
            id(sunrise_time_sensor).publish_state(r.sunrise_str);
            id(sunset_time_sensor).publish_state(r.sunset_str);
          }
          id(backlight_apply_brightness).execute();

# =============================================================================
# PERIODIC CHECK (60 seconds)
# =============================================================================

interval:
  - interval: 60s
    then:
      - script.execute: screen_schedule_check
      - if:
          condition:
            lambda: |-
              auto now = id(ha_time).now();
              if (!now.is_valid()) return false;
              bool changed = check_daylight_transition(
                id(sunrise_sunset_valid), id(sunrise_hour), id(sunrise_minute),
                id(sunset_hour), id(sunset_minute), now.hour, now.minute,
                id(last_is_daytime));
              if (changed) id(last_is_daytime) = !id(last_is_daytime);
              return changed;
          then:
            - script.execute: backlight_apply_brightness
      - if:
          condition:
            lambda: |-
              auto now = id(ha_time).now();
              return now.is_valid() && now.hour == 0 && now.minute == 0;
          then:
            - script.execute: backlight_recalc_sunrise_sunset
