# =============================================================================
# BACKLIGHT - Screensaver, clock overlay, and setup screen dim
# =============================================================================
# Two screensaver mechanisms that coexist:
#   1. Idle timer: configurable timeout (default 5 min), sleeps after inactivity
#   2. Presence sensor: optional HA binary_sensor, wakes display on detection
# When the clock screensaver is enabled, the idle timer shows a drifting clock
# instead of turning off the display. The label repositions each update for
# burn-in prevention.
# Setup screen dim: dims to 50% after 120s on static setup pages.
# Touch wake is handled by the touchscreen on_touch in device.yaml.
# =============================================================================

globals:
  - id: display_asleep
    type: bool
    initial_value: 'false'
  - id: screensaver_display_off_active
    type: bool
    initial_value: 'false'
  - id: presence_detected
    type: bool
    initial_value: 'false'
  - id: is_clock_showing
    type: bool
    initial_value: 'false'

script:
  # Screensaver idle timer (restartable)
  - id: screensaver_idle_check
    mode: restart
    then:
      - delay: !lambda |-
          float val = id(screensaver_timeout).state;
          if (std::isnan(val) || val <= 0) val = 300;
          return (int)(val * 1000);
      - if:
          condition:
            lambda: 'return id(screensaver_mode).state == "disabled";'
          then:
            - globals.set:
                id: display_asleep
                value: 'false'
          else:
            - if:
                condition:
                  lambda: 'return id(screensaver_mode).state == "sensor" && id(presence_detected);'
                then:
                  - script.execute: screensaver_idle_check
                else:
                  - script.execute: screensaver_sleep_timer

  # Re-apply the current asleep state when settings change while asleep.
  - id: screensaver_apply_sleep_state
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(screensaver_mode).state == "disabled";'
          then:
            - script.execute: screensaver_wake
          else:
            - if:
                condition:
                  lambda: 'return id(screensaver_mode).state == "sensor";'
                then:
                  - script.execute: screensaver_sleep_sensor
                else:
                  - script.execute: screensaver_sleep_timer

  # Timer mode honours the display-off/dimmed/clock setting.
  - id: screensaver_sleep_timer
    mode: restart
    then:
      - globals.set:
          id: display_asleep
          value: 'true'
      - if:
          condition:
            lambda: 'return id(screensaver_action).state == "clock" || (id(screensaver_action).state.empty() && id(clock_screensaver_enabled).state);'
          then:
            - script.execute: show_clock_view
          else:
            - if:
                condition:
                  lambda: 'return id(screensaver_action).state == "dim";'
                then:
                  - script.execute: screensaver_sleep_dim
                else:
                  - script.execute: screensaver_sleep_display_off

  # Sensor mode always turns the display off and leaves LVGL snow underneath.
  - id: screensaver_sleep_sensor
    mode: restart
    then:
      - script.stop: screensaver_idle_check
      - script.execute: screensaver_sleep_display_off

  - id: screensaver_sleep_display_off
    mode: restart
    then:
      - globals.set:
          id: display_asleep
          value: 'true'
      - globals.set:
          id: screensaver_display_off_active
          value: 'true'
      - script.execute: hide_clock_view
      - light.turn_off: display_backlight
      - lvgl.pause:
          show_snow: true

  - id: screensaver_sleep_dim
    mode: restart
    then:
      - globals.set:
          id: display_asleep
          value: 'true'
      - globals.set:
          id: screensaver_display_off_active
          value: 'false'
      - lvgl.resume:
      - script.execute: hide_clock_view
      - light.turn_on:
          id: display_backlight
          brightness: !lambda 'return id(clock_brightness).state / 100.0f;'
          transition_length: 3s

  # Setup screen burn-in protection
  - id: setup_screen_dim
    mode: restart
    then:
      - delay: 120s
      - globals.set:
          id: display_asleep
          value: 'true'
      - light.turn_on:
          id: display_backlight
          brightness: 50%
          transition_length: 2s

  # Home screen return timer (restartable)
  - id: home_screen_idle_check
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              float val = id(home_screen_timeout).state;
              return !std::isnan(val) && val > 0;
          then:
            - delay: !lambda |-
                float val = id(home_screen_timeout).state;
                if (std::isnan(val) || val <= 0) val = 60;
                return (int)(val * 1000);
            - lambda: |-
                if (lv_scr_act() != id(main_page)->obj) {
                  lv_scr_load_anim(id(main_page)->obj, LV_SCR_LOAD_ANIM_NONE, 0, 0, false);
                }

  # Wake from screensaver
  - id: screensaver_wake
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(display_asleep);'
          then:
            - script.stop: screensaver_idle_check
            - globals.set:
                id: screensaver_display_off_active
                value: 'false'
            - lvgl.resume:
            - if:
                condition:
                  lambda: 'return id(is_clock_showing);'
                then:
                  - globals.set:
                      id: display_asleep
                      value: 'false'
                  - script.execute: backlight_apply_brightness
                  - delay: 300ms
                  - script.execute: hide_clock_view
                else:
                  - script.execute: hide_clock_view
                  - delay: 100ms
                  - globals.set:
                      id: display_asleep
                      value: 'false'
                  - script.execute: backlight_apply_brightness
      - script.execute: screensaver_idle_check
      - script.execute: home_screen_idle_check

  # Show the clock screensaver overlay
  - id: show_clock_view
    mode: single
    then:
      - globals.set:
          id: screensaver_display_off_active
          value: 'false'
      - lvgl.resume:
      - lambda: |-
          id(is_clock_showing) = true;
          auto time = id(ha_time).now();
          if (time.is_valid()) {
            char buf[12];
            int hr = time.hour, mn = time.minute;
            bool use_12h = id(clock_format_select).current_option() == "12h";
            if (use_12h) {
              int h12 = hr % 12; if (h12 == 0) h12 = 12;
              snprintf(buf, sizeof(buf), "%d:%02d", h12, mn);
            } else {
              snprintf(buf, sizeof(buf), "%02d:%02d", hr, mn);
            }
            lv_label_set_text(id(clock_label), buf);
            lv_obj_update_layout(id(clock_label));
            lv_coord_t w = lv_obj_get_width(id(clock_label));
            lv_coord_t h = lv_obj_get_height(id(clock_label));
            int cx = ${clock_cx}, cy = ${clock_cy};
            int ox = (time.minute * 7) % 61 - 30;
            int oy = (time.minute * 13) % 41 - 20;
            lv_obj_set_pos(id(clock_label), cx + ox - w/2, cy + oy - h/2);
          }
      - lvgl.widget.show: clock_screensaver
      - lvgl.widget.hide: display_time
      - lvgl.widget.hide: temperatures
      - light.turn_on:
          id: display_backlight
          brightness: !lambda 'return id(clock_brightness).state / 100.0f;'
          transition_length: 3s

  # Hide the clock screensaver overlay
  - id: hide_clock_view
    mode: single
    then:
      - lambda: 'id(is_clock_showing) = false;'
      - lvgl.widget.hide: clock_screensaver
      - lvgl.widget.show: display_time
      - if:
          condition:
            or:
              - switch.is_on: indoor_temp_enable
              - switch.is_on: outdoor_temp_enable
          then:
            - lvgl.widget.show: temperatures

# -----------------------------------------------------------------------------
# Clock screensaver drift update (repositions label for burn-in prevention)
# -----------------------------------------------------------------------------
interval:
  - interval: 30s
    then:
      - lambda: |-
          if (!id(is_clock_showing)) return;
          auto time = id(ha_time).now();
          if (!time.is_valid()) return;
          char buf[12];
          int hr = time.hour, mn = time.minute;
          bool use_12h = id(clock_format_select).current_option() == "12h";
          if (use_12h) {
            int h12 = hr % 12; if (h12 == 0) h12 = 12;
            snprintf(buf, sizeof(buf), "%d:%02d", h12, mn);
          } else {
            snprintf(buf, sizeof(buf), "%02d:%02d", hr, mn);
          }
          lv_label_set_text(id(clock_label), buf);
          lv_obj_update_layout(id(clock_label));
          lv_coord_t w = lv_obj_get_width(id(clock_label));
          lv_coord_t h = lv_obj_get_height(id(clock_label));
          int cx = ${clock_cx}, cy = ${clock_cy};
          int ox = (time.minute * 7) % 61 - 30;
          int oy = (time.minute * 13) % 41 - 20;
          lv_obj_set_pos(id(clock_label), cx + ox - w/2, cy + oy - h/2);
