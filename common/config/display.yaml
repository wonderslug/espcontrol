    icon: "mdi:speaker-play"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_saver_cover_art_entity}"
    internal: true
    id: cover_art_media_player_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:speaker-play"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - globals.set:
            id: cover_art_subscribed_entity
            value: '""'
        - script.execute: cover_art_playback_stopped
