# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

switch:
  - platform: template
    name: "Indoor Temp Enable"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, true, id(outdoor_temp_enable).state);'
    on_turn_off:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, false, id(outdoor_temp_enable).state);'

  - platform: template
    name: "Outdoor Temp Enable"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, true, id(indoor_temp_enable).state);'
    on_turn_off:
      - lambda: 'update_temp_label(id(temperatures), id(main_page)->obj, false, id(indoor_temp_enable).state);'

  - platform: template
    name: "Screen Saver: Clock"
    internal: true
    id: clock_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:clock-outline"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

text:
  - platform: template
    name: "Indoor Temp Entity"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Outdoor Temp Entity"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Screensaver Mode"
    internal: true
    id: screensaver_mode
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 10
    mode: text
    entity_category: config
    icon: "mdi:timer-cog-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(display_asleep);'
            then:
              - script.execute: screensaver_apply_sleep_state
            else:
              - if:
                  condition:
                    lambda: 'return lv_scr_act() == id(main_page)->obj;'
                  then:
                    - script.execute: screensaver_idle_check

  - platform: template
    name: "Screensaver Action"
    internal: true
    id: screensaver_action
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 10
    mode: text
    entity_category: config
    icon: "mdi:brightness-6"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(display_asleep);'
            then:
              - script.execute: screensaver_apply_sleep_state
            else:
              - if:
                  condition:
                    lambda: 'return lv_scr_act() == id(main_page)->obj;'
                  then:
                    - script.execute: screensaver_idle_check

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "Presence Sensor Entity"
    internal: true
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver

number:
  - platform: template
    name: "Screen Saver: Clock Brightness"
    internal: true
    id: clock_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(display_asleep) && (id(screensaver_action).state == "dim" || id(is_clock_showing));'
            then:
              - script.execute: screensaver_apply_sleep_state

  # Screensaver idle timeout
  - platform: template
    name: "Screensaver Timeout"
    internal: true
    id: screensaver_timeout
    min_value: 60
    max_value: 3600
    step: 30
    initial_value: 1800
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Home screen return timeout (0 = disabled)
  - platform: template
    name: "Home Screen Timeout"
    internal: true
    id: home_screen_timeout
    min_value: 0
    max_value: 300
    step: 1
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:home-clock"
    web_server:
      sorting_group_id: sg_screensaver
