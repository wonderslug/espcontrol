# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

globals:
  - id: screen_rotation_ready
    type: bool
    restore_value: no
    initial_value: 'false'

esphome:
  on_boot:
    # Apply restored clock-bar layout before subpages copy main-page padding.
    priority: -150
    then:
      - lambda: |-
          set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                       id(timezone_select).current_option());
          set_display_temperature_degree_symbol(id(temperature_degree_symbol_enabled).state);
      - script.execute: clock_bar_apply

script:
  - id: clock_bar_apply
    mode: restart
    then:
      - lambda: |-
          bool enabled = id(clock_bar_enabled).state;
          bool fullscreen_screensaver_active =
              id(is_clock_showing) || id(cover_art_screensaver_active);
          bool visible = enabled && !fullscreen_screensaver_active;
          bool show_time = visible && id(clock_bar_time_enabled).state;
          bool show_network = visible && id(network_status_enabled).state;
          int clock_bar_label_y = ${main_page_pad_top} / 5;
          int clock_bar_gap = ${screen_width} / 8;
          if (clock_bar_gap < 92) clock_bar_gap = 92;
          if (clock_bar_gap > 120) clock_bar_gap = 120;
          apply_clock_bar_layout(id(clock_bar_layout).state,
                                 id(temperatures),
                                 id(display_time),
                                 id(network_status_button),
                                 ${screen_width} >= 700 ? 12 : 8,
                                 clock_bar_label_y,
                                 ${screen_width} >= 700 ? 20 : 16,
                                 clock_bar_label_y > 7 ? clock_bar_label_y - 7 : 1,
                                 clock_bar_gap);
          lv_obj_set_style_pad_top(
            id(main_page)->obj,
            visible ? ${main_page_pad_top} : ${main_page_compact_pad_top},
            LV_PART_MAIN);
          lv_obj_update_layout(id(main_page)->obj);

          if (!visible) {
            lv_obj_add_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            network_status_hide_modal();
          }

          if (show_time && lv_scr_act() == id(main_page)->obj) {
            lv_obj_clear_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
          }
          if (show_network && lv_scr_act() == id(main_page)->obj) {
            lv_obj_clear_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
            id(network_status_refresh).execute();
          } else {
            lv_obj_add_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
            network_status_hide_modal();
          }
          if (!visible) return;

          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    visible,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

switch:
  - platform: template
    name: "${entity_screen_clock_bar}"
    internal: true
    id: clock_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:clock-digital"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
    on_turn_off:
      - script.execute: clock_bar_apply

  - platform: template
    name: "${entity_screen_network_status_icon}"
    internal: true
    id: network_status_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:wifi"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
    on_turn_off:
      - script.execute: clock_bar_apply

  - platform: template
    name: "${entity_screen_clock_bar_time}"
    internal: true
    id: clock_bar_time_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:clock-time-four-outline"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
    on_turn_off:
      - script.execute: clock_bar_apply

  - platform: template
    name: "${entity_indoor_temp_enable}"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state &&
                                      !id(is_clock_showing) &&
                                      !id(cover_art_screensaver_active),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state &&
                                      !id(is_clock_showing) &&
                                      !id(cover_art_screensaver_active),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "${entity_outdoor_temp_enable}"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state &&
                                      !id(is_clock_showing) &&
                                      !id(cover_art_screensaver_active),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state &&
                                      !id(is_clock_showing) &&
                                      !id(cover_art_screensaver_active),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "${entity_screen_temperature_degree_symbol}"
    internal: true
    id: temperature_degree_symbol_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:temperature-celsius"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          set_display_temperature_degree_symbol(true);
          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state &&
                                      !id(is_clock_showing) &&
                                      !id(cover_art_screensaver_active),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          set_display_temperature_degree_symbol(false);
          refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state &&
                                      !id(is_clock_showing) &&
                                      !id(cover_art_screensaver_active),
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "${entity_screen_subpage_chevron}"
    internal: true
    id: subpage_chevrons_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:chevron-right"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: refresh_button_grid
    on_turn_off:
      - script.execute: refresh_button_grid

  - platform: template
    name: "${entity_screen_saver_clock}"
    internal: true
    id: clock_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:clock-outline"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !screensaver_action_clock_mode(id(screensaver_action).current_option());'
          then:
            - select.set:
                id: screensaver_action
                option: "Clock"
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return screensaver_action_clock_mode(id(screensaver_action).current_option());'
          then:
            - select.set:
                id: screensaver_action
                option: "Display Off"
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_saver_media_player_sleep_prevention}"
    internal: true
    id: media_player_sleep_prevention_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:speaker-play"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_saver_cover_art}"
    internal: true
    id: cover_art_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:image-album"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - script.execute: cover_art_resubscribe
      - script.execute: cover_art_playback_refresh
    on_turn_off:
      - script.execute: cover_art_disable

  - platform: template
    name: "${entity_screen_saver_open_media_subpage}"
    internal: true
    id: cover_art_open_media_subpage_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:page-next-outline"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver

  - platform: template
    name: "${entity_screen_saver_cover_art_progress_bar}"
    internal: true
    id: cover_art_progress_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:progress-clock"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return id(cover_art_screensaver_active) && id(cover_art_image_available);'
          then:
            - lvgl.widget.show: cover_art_progress_bar
            - script.execute: cover_art_refresh_progress
    on_turn_off:
      - lvgl.widget.hide: cover_art_progress_bar

select:
  - platform: template
    name: "${entity_screen_saver_action}"
    internal: true
    id: screensaver_action
    entity_category: config
    icon: "mdi:monitor-shimmer"
    optimistic: true
    restore_value: true
    initial_option: "Display Off"
    options:
      - "Display Off"
      - "Screen Dimmed"
      - "Clock"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                return screensaver_action_clock_mode(id(screensaver_action).current_option()) &&
                       !id(clock_screensaver_enabled).state;
            then:
              - switch.turn_on: clock_screensaver_enabled
        - if:
            condition:
              lambda: |-
                return !screensaver_action_clock_mode(id(screensaver_action).current_option()) &&
                       id(clock_screensaver_enabled).state;
            then:
              - switch.turn_off: clock_screensaver_enabled
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  - platform: template
    name: "${entity_screen_temperature_unit}"
    internal: true
    disabled_by_default: true
    id: temperature_unit_select
    entity_category: config
    icon: "mdi:temperature-celsius"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "°C"
      - "°F"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                         id(timezone_select).current_option());
            refresh_temperature_unit_labels();
            refresh_clock_bar_temperature_label_values(id(temperatures), id(main_page)->obj,
                                      id(clock_bar_enabled).state &&
                                        !id(is_clock_showing) &&
                                        !id(cover_art_screensaver_active),
                                      id(indoor_temp_enable).state,
                                      id(outdoor_temp_enable).state,
                                      id(indoor_temp), id(outdoor_temp));

