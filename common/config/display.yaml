    min_length: 0
    max_length: 120
    mode: text
    entity_category: config
    icon: "mdi:home-assistant"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver

  - platform: template
    name: "${entity_screen_saver_media_subpage}"
    internal: true
    id: cover_art_media_subpage_target
    optimistic: true
    restore_value: true
    initial_value: ""
