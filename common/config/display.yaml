number:
  - platform: template
    name: "${entity_screen_saver_daytime_clock_brightness}"
    internal: true
    id: clock_brightness_day
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - lambda: 'global_preferences->sync();'
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "${entity_screen_saver_nighttime_clock_brightness}"
    internal: true
    id: clock_brightness_night
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - lambda: 'global_preferences->sync();'
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "${entity_screen_saver_dimmed_brightness}"
    internal: true
    id: screensaver_dimmed_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screensaver_dimmed_active);'
            then:
              - script.execute: screensaver_dimmed_refresh_brightness

  - platform: template
    name: "${entity_screen_saver_cover_art_delay}"
    internal: true
    id: cover_art_delay
    min_value: 5
    max_value: 300
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - script.execute: cover_art_playback_refresh

  - platform: template
    name: "${entity_screen_saver_track_overlay_duration}"
    internal: true
    id: cover_art_track_overlay_duration
    min_value: 0
    max_value: 60
    step: 1
    initial_value: 5
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:playlist-music-outline"
    web_server:
      sorting_group_id: sg_screensaver

  # Legacy setting kept so existing panels can migrate their saved single
  # clock brightness into the new day/night settings, and so older cached web
  # UIs still change the live screensaver brightness after startup.
  - platform: template
    name: "${entity_screen_saver_clock_brightness}"
    internal: true
    id: clock_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:clock-outline"
    on_value:
      then:
        - lambda: |-
            if (!id(clock_brightness_legacy_sync_ready)) return;
            auto clamp_clock_pct = [](float pct, float fallback) -> float {
              if (std::isnan(pct) || pct <= 0.0f) pct = fallback;
              if (pct < 1.0f) pct = 1.0f;
              if (pct > 100.0f) pct = 100.0f;
              return pct;
            };
            float legacy_pct = clamp_clock_pct(id(clock_brightness).state, 35.0f);
            float previous_pct = clamp_clock_pct(
              id(clock_brightness_legacy_last_level), legacy_pct);
            if (legacy_pct == previous_pct) return;
            id(clock_brightness_legacy_last_level) = legacy_pct;

            auto day_call = id(clock_brightness_day).make_call();
            day_call.set_value(legacy_pct);
            day_call.perform();

            auto night_call = id(clock_brightness_night).make_call();
            night_call.set_value(legacy_pct);
            night_call.perform();
            global_preferences->sync();

  # Screensaver idle timeout
  - platform: template
    name: "${entity_screensaver_timeout}"
    internal: true
    id: screensaver_timeout
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 1800
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Home screen return timeout (0 = disabled)
  - platform: template
    name: "${entity_home_screen_timeout}"
    internal: true
