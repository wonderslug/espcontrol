# =============================================================================
# FONTS - Roboto variants for main UI and setup screens
# =============================================================================

font:
  # Main page: large statistics / sensor values
  - file: "gfonts://Roboto"
    id: statistics_font
    size: 48
    bpp: 4
    glyphs: "0123456789.-°/%kWhVA "

  # Main page: button labels
  - file: "gfonts://Roboto"
    id: label_font
    size: 22
    bpp: 4

  # Top bar: clock and temperature
  - file: "gfonts://Roboto"
    id: clockbar_font
    size: 20
    bpp: 4

