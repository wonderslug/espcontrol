# =============================================================================
# FONTS - Roboto variants for main UI and setup screens
# =============================================================================

font:
  # Main page: large statistics / sensor values
  - file: "gfonts://Roboto@Light"
    id: statistics_font
    size: 48
    bpp: 4
    glyphs:
      - "0123456789.-В°/%kWhVA "
      - ":"

  # Climate detail page: oversized target temperature
  - file: "gfonts://Roboto@Light"
    id: climate_target_font
    size: 132
    bpp: 4
    glyphs:
      - "0123456789.-"

  # Main page: forecast high / low values
  - file: "gfonts://Roboto@Light"
    id: forecast_font
    size: 42
    bpp: 4
    glyphs:
      - "0123456789.- /"

  # Main page: compact weather temperature unit symbol
  - file: "gfonts://Noto Sans"
    id: forecast_unit_font
    size: 22
    bpp: 4
    glyphs:
      - "В°"

  # Main page: button labels
  - file: "gfonts://Roboto"
    id: label_font
    size: 22
    bpp: 4
    glyphs: !include text_glyphs.yaml

  # Top bar: clock and temperature
  - file: "gfonts://Roboto"
    id: clockbar_font
    size: 20
    bpp: 4

  # Setup screens: titles (40px light)
  - file: "gfonts://Roboto@Light"
    id: setup_title_font
    size: 40
    bpp: 4
    glyphs: >-
      !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~
      ВЎВҝГҖГҒГӮГғГ„Г…ГҶГҮГҲГүГҠГӢГҢГҚГҺГҸГҗГ‘Г’Г“Г”Г•Г–Г—ГҳГҷГҡГӣГңГқГһГҹГ ГЎГўГЈГӨГҘГҰГ§ГЁГ©ГӘГ«Г¬ГӯГ®ГҜГ°ГұГІГіГҙГөГ¶Г·ГёГ№ГәГ»ГјГҪГҫГҝвҖ”вҖ“вҖҰВ·В°вҖўвӮ¬ВЈВҘВў

  # Setup screens: body text (24px)
  - file: "gfonts://Roboto"
    id: setup_body_font
    size: 24
    bpp: 4
    glyphs: >-
      !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~
      ВЎВҝГҖГҒГӮГғГ„Г…ГҶГҮГҲГүГҠГӢГҢГҚГҺГҸГҗГ‘Г’Г“Г”Г•Г–Г—ГҳГҷГҡГӣГңГқГһГҹГ ГЎГўГЈГӨГҘГҰГ§ГЁГ©ГӘГ«Г¬ГӯГ®ГҜГ°ГұГІГіГҙГөГ¶Г·ГёГ№ГәГ»ГјГҪГҫГҝвҖ”вҖ“вҖҰВ·В°вҖўвӮ¬ВЈВҘВў
