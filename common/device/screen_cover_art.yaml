# =============================================================================
# COVER ART SCREENSAVER - Full-screen artwork overlay while media is playing
# =============================================================================

globals:
  - id: cover_art_screensaver_active
    type: bool
    initial_value: 'false'
  - id: cover_art_media_playing
    type: bool
    initial_value: 'false'
  - id: cover_art_media_subpage_opened
    type: bool
    initial_value: 'false'
  - id: cover_art_url
    type: std::string
    initial_value: '""'
  - id: cover_art_title
    type: std::string
    initial_value: '""'
  - id: cover_art_artist
    type: std::string
    initial_value: '""'
  - id: cover_art_subscribed_entity
    type: std::string
    initial_value: '""'
  - id: cover_art_media_duration
    type: float
    initial_value: '0.0'
  - id: cover_art_media_position
    type: float
    initial_value: '0.0'
  - id: cover_art_position_anchor_epoch
    type: int
    initial_value: '0'
  - id: cover_art_last_position_timestamp
    type: int
    initial_value: '0'
  - id: cover_art_last_progress_percent
    type: int
    initial_value: '-1'

api:
  on_client_connected:
    - delay: 2s
    - globals.set:
        id: cover_art_subscribed_entity
        value: '""'
    - script.execute: cover_art_resubscribe

image:
  - file: "https://raw.githubusercontent.com/jtenniswood/esphome-media-player/main/common/assets/placeholder.png"
    id: cover_art_placeholder
    type: RGB565
    byte_order: LITTLE_ENDIAN

artwork_image:
  - url: "https://placehold.co/${cover_art_size}x${cover_art_size}/111111/333333.jpg"
    id: cover_art_downloaded_image
    format: AUTO
    type: RGB565
    byte_order: LITTLE_ENDIAN
    placeholder: cover_art_placeholder
    resize: ${cover_art_size}x${cover_art_size}
    buffer_size: 65536
    allow_insecure_local_urls: true
    on_download_finished:
      - script.execute: cover_art_apply_downloaded_image
    on_error:
      - script.execute: cover_art_download_failed

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(cover_art_screensaver_active) && id(cover_art_media_playing);'
          then:
            - script.execute: cover_art_refresh_progress

lvgl:
  top_layer:
    widgets:
      - obj:
          id: cover_art_screensaver
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0x000000
          bg_opa: 100%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          scrollbar_mode: "off"
          clickable: true
          hidden: true
          on_press:
            then:
              - script.execute: screensaver_wake
          widgets:
            - obj:
                id: cover_art_backdrop
                x: ${cover_art_x}
                y: ${cover_art_y}
                width: ${cover_art_size}px
                height: ${cover_art_size}px
                bg_color: 0x000000
                bg_opa: 100%
                radius: 0
                border_width: 0
                pad_all: 0
                scrollable: false
                scrollbar_mode: "off"
                clickable: false
            - image:
                id: cover_art_image_widget
                x: ${cover_art_x}
                y: ${cover_art_y}
                width: ${cover_art_size}px
                height: ${cover_art_size}px
                src: cover_art_downloaded_image
                opa: 100%
            - obj:
                id: cover_art_accent_overlay
                x: ${cover_art_accent_x}
                y: ${cover_art_accent_y}
                width: ${cover_art_accent_width}px
                height: ${cover_art_accent_height}px
                bg_color: 0x000000
                bg_opa: ${cover_art_accent_bg_opa}
                opa: ${cover_art_accent_opa}
                radius: 0
                border_width: 0
                pad_all: 0
                scrollable: false
                scrollbar_mode: "off"
                clickable: false
                hidden: true
            - obj:
                id: cover_art_track_panel
                x: ${cover_art_panel_x}
                y: ${cover_art_panel_y}
                width: ${cover_art_panel_width}px
                height: ${cover_art_panel_height}px
                bg_opa: 0%
                radius: 0
                border_width: 0
                pad_top: ${cover_art_panel_pad_top}
                pad_bottom: ${cover_art_panel_pad_bottom}
                pad_left: ${cover_art_panel_pad_left}
                pad_right: ${cover_art_panel_pad_right}
                scrollable: false
                scrollbar_mode: "off"
                clickable: false
                hidden: true
                layout:
                  type: flex
                  flex_flow: COLUMN
                  pad_row: ${cover_art_panel_pad_row}
                widgets:
                  - label:
                      id: cover_art_title_label
                      text: "—"
                      width: 100%
                      max_height: ${cover_art_title_max_height}px
                      long_mode: wrap
                      text_font: ${cover_art_title_font}
                      text_color: ${cover_art_text_color}
                      text_align: left
                      text_line_space: 0
                  - label:
                      id: cover_art_artist_label
                      text: ""
                      pad_top: ${cover_art_artist_pad_top}
                      width: 100%
                      long_mode: ${cover_art_artist_long_mode}
                      text_font: ${cover_art_artist_font}
                      text_color: ${cover_art_text_color}
                      text_opa: 80%
                      text_align: left
                      hidden: true
                  - label:
                      id: cover_art_time_label
                      text: "0:00  /  0:00"
                      pad_top: ${cover_art_time_pad_top}
                      width: 100%
                      text_font: ${cover_art_time_font}
                      text_color: ${cover_art_text_color}
                      text_opa: 80%
                      text_align: left
            - bar:
                id: cover_art_progress_bar
                align: bottom_mid
                y: 0
                width: ${cover_art_progress_width}px
                height: 4px
                bg_color: 0x000000
                bg_opa: 50%
                radius: 0
                min_value: 0
                max_value: 100
                value: 0
                hidden: true
                indicator:
                  bg_color: ${cover_art_text_color}
                  radius: 0
            - label:
                id: cover_art_error_label
                text: "Artwork unavailable"
                align: center
                text_font: ${cover_art_artist_font}
                text_color: 0x888888
                text_align: center
                hidden: true

script:
  - id: cover_art_apply_downloaded_image
    mode: restart
    then:
      - lvgl.image.update:
          id: cover_art_image_widget
          src: cover_art_downloaded_image
      - lvgl.widget.hide: cover_art_error_label

  - id: cover_art_download_failed
    mode: restart
    then:
      - lambda: |-
          ESP_LOGW("cover_art", "Artwork download failed");
      - if:
          condition:
            lambda: 'return id(cover_art_screensaver_active);'
          then:
            - lvgl.widget.show: cover_art_error_label

  - id: cover_art_download
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(cover_art_url).empty();'
          then:
            - lambda: |-
                ESP_LOGI("cover_art", "Downloading artwork URL (%u chars)", (unsigned) id(cover_art_url).size());
            - artwork_image.set_url:
                id: cover_art_downloaded_image
                url: !lambda 'return id(cover_art_url);'

  - id: cover_art_sync_track_text
    mode: restart
    then:
      - lvgl.label.update:
          id: cover_art_title_label
          text: !lambda |-
            if (id(cover_art_title).empty()) return std::string("—");
            return id(cover_art_title);
      - if:
          condition:
            lambda: 'return !id(cover_art_artist).empty();'
          then:
            - lvgl.label.update:
                id: cover_art_artist_label
                text: !lambda 'return id(cover_art_artist);'
            - lvgl.widget.show: cover_art_artist_label
          else:
            - lvgl.widget.hide: cover_art_artist_label

  - id: cover_art_refresh_progress
    mode: restart
    then:
      - lambda: |-
          float duration = id(cover_art_media_duration);
          float position = id(cover_art_media_position);
          auto now = id(panel_time).now();

          if (id(cover_art_media_playing) && now.is_valid()) {
            if (id(cover_art_position_anchor_epoch) != 0) {
              position = id(cover_art_media_position) +
                         (float)(now.timestamp - id(cover_art_position_anchor_epoch));
            } else if (id(cover_art_last_position_timestamp) != 0) {
              position = id(cover_art_media_position) +
                         (float)(now.timestamp - id(cover_art_last_position_timestamp));
            }
          }

          if (position < 0.0f) position = 0.0f;
          if (duration > 0.0f && position > duration) position = duration;
          id(cover_art_media_position) = position;
          if (now.is_valid()) id(cover_art_last_position_timestamp) = now.timestamp;

          int elapsed = (int) position;
          if (elapsed < 0) elapsed = 0;
          int total = (int) duration;
          if (total < 0) total = 0;

          char label[32];
          if (duration >= 3600.0f) {
            snprintf(label, sizeof(label), "%d:%02d:%02d  /  %d:%02d:%02d",
                     elapsed / 3600, (elapsed % 3600) / 60, elapsed % 60,
                     total / 3600, (total % 3600) / 60, total % 60);
          } else {
            snprintf(label, sizeof(label), "%d:%02d  /  %d:%02d",
                     elapsed / 60, elapsed % 60, total / 60, total % 60);
          }
          lv_label_set_text(id(cover_art_time_label), label);

          int value = 0;
          if (duration > 0.0f) {
            value = (int)((position / duration) * 100.0f + 0.5f);
          }
          if (value < 0) value = 0;
          if (value > 100) value = 100;
          if (value == id(cover_art_last_progress_percent)) return;
          id(cover_art_last_progress_percent) = value;
          lv_bar_set_value(id(cover_art_progress_bar), value, LV_ANIM_OFF);

  - id: cover_art_show_track_overlay
    mode: restart
    then:
      - script.execute: cover_art_sync_track_text
      - lambda: |-
          lv_obj_set_style_text_line_space(id(cover_art_title_label), ${cover_art_title_line_space}, 0);
      - lvgl.widget.show: cover_art_accent_overlay
      - lvgl.widget.show: cover_art_track_panel
      - lvgl.widget.show: cover_art_progress_bar
      - script.execute: cover_art_refresh_progress
      - if:
          condition:
            lambda: 'return ${cover_art_square_overlay} && id(cover_art_track_overlay_duration).state > 0;'
          then:
            - delay: !lambda 'return (uint32_t)(id(cover_art_track_overlay_duration).state * 1000);'
            - if:
                condition:
                  lambda: 'return id(cover_art_screensaver_active) && ${cover_art_square_overlay};'
                then:
                  - lvgl.widget.hide: cover_art_accent_overlay
                  - lvgl.widget.hide: cover_art_track_panel

  - id: show_cover_art_view
    mode: restart
    then:
      - script.stop: cover_art_delay_timer
      - script.execute: cover_art_sync_track_text
      - globals.set:
          id: display_asleep
          value: 'true'
      - globals.set:
          id: cover_art_screensaver_active
          value: 'true'
      - globals.set:
          id: screensaver_display_off_active
          value: 'false'
      - globals.set:
          id: screensaver_dimmed_active
          value: 'false'
      - lvgl.resume:
      - script.execute: hide_clock_view
      - script.execute: clock_bar_apply
      - lvgl.widget.hide: dim_screensaver_touch_guard
      - lvgl.widget.hide: cover_art_error_label
      - lvgl.widget.show: cover_art_screensaver
      - if:
          condition:
            lambda: 'return ${cover_art_square_overlay};'
          then:
            - script.execute: cover_art_show_track_overlay
          else:
            - lambda: |-
                lv_obj_set_style_text_line_space(id(cover_art_title_label), ${cover_art_title_line_space}, 0);
            - lvgl.widget.show: cover_art_accent_overlay
            - lvgl.widget.show: cover_art_track_panel
      - lvgl.widget.show: cover_art_progress_bar
      - script.execute: cover_art_refresh_progress
      - script.execute: backlight_apply_brightness

  - id: hide_cover_art_view
    mode: restart
    then:
      - script.stop: cover_art_delay_timer
      - script.stop: cover_art_show_track_overlay
      - globals.set:
          id: cover_art_screensaver_active
          value: 'false'
      - lvgl.widget.hide: cover_art_screensaver
      - lvgl.widget.hide: cover_art_accent_overlay
      - lvgl.widget.hide: cover_art_track_panel
      - lvgl.widget.hide: cover_art_progress_bar
      - lvgl.widget.hide: cover_art_error_label
      - script.execute: clock_bar_apply

  - id: cover_art_delay_timer
    mode: restart
    then:
      - delay: !lambda |-
          float seconds = id(cover_art_delay).state;
          if (std::isnan(seconds) || seconds < 0.0f) seconds = 10.0f;
          return (uint32_t)(seconds * 1000.0f);
      - if:
          condition:
            lambda: |-
              return id(cover_art_screensaver_enabled).state &&
                     id(cover_art_media_playing) &&
                     !id(cover_art_media_player_entity).state.empty();
          then:
            - script.execute: show_cover_art_view

  - id: cover_art_playback_refresh
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(cover_art_screensaver_enabled).state &&
                     id(cover_art_media_playing) &&
                     !id(cover_art_media_player_entity).state.empty();
          then:
            - script.execute: cover_art_playback_started
          else:
            - script.execute: cover_art_playback_stopped

  - id: cover_art_resubscribe
    mode: restart
    then:
      - lambda: |-
          const std::string cover_entity = id(cover_art_media_player_entity).state;
          if (cover_entity.empty() || cover_entity == id(cover_art_subscribed_entity)) return;
          id(cover_art_subscribed_entity) = cover_entity;
          ESP_LOGI("cover_art", "Subscribing to artwork entity: %s", cover_entity.c_str());

          ha_subscribe_state(
            cover_entity,
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef state) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string state_text = string_ref_limited(state, HA_SHORT_STATE_MAX_LEN);
                bool playing = state_text == "playing";
                id(cover_art_media_playing) = playing;
                auto now = id(panel_time).now();
                if (playing && now.is_valid()) id(cover_art_last_position_timestamp) = now.timestamp;
                if (playing) id(cover_art_playback_started).execute();
                else id(cover_art_playback_stopped).execute();
              })
          );

          ha_subscribe_attribute(
            cover_entity, std::string("media_title"),
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef title) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string next = string_ref_limited(title, HA_STATE_TEXT_MAX_LEN);
                if (next == "unknown" || next == "unavailable") next.clear();
                bool changed = next != id(cover_art_title);
                id(cover_art_title) = next;
                id(cover_art_sync_track_text).execute();
                if (changed && id(cover_art_screensaver_active)) {
                  id(cover_art_show_track_overlay).execute();
                }
              })
          );

          ha_subscribe_attribute(
            cover_entity, std::string("media_artist"),
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef artist) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string next = string_ref_limited(artist, HA_STATE_TEXT_MAX_LEN);
                if (next == "unknown" || next == "unavailable") next.clear();
                id(cover_art_artist) = next;
                id(cover_art_sync_track_text).execute();
              })
          );

          ha_subscribe_attribute(
            cover_entity, std::string("entity_picture"),
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef picture) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string path = string_ref_limited(picture, HA_TEXT_SENSOR_STATE_MAX_LEN);
                if (path.empty() || path == "unknown" || path == "unavailable") return;
                std::string url = path;
                if (!(path.rfind("http://", 0) == 0 || path.rfind("https://", 0) == 0)) {
                  std::string base = id(cover_art_home_assistant_url).state;
                  if (base.empty()) {
                    ESP_LOGW("cover_art", "Relative artwork URL needs Screen Saver: Home Assistant URL");
                    return;
                  }
                  while (!base.empty() && base.back() == '/') base.pop_back();
                  url = base + path;
                }
                ESP_LOGI("cover_art", "Artwork entity_picture received (%u chars)", (unsigned) path.size());
                if (url == id(cover_art_url)) return;
                id(cover_art_url) = url;
                id(cover_art_download).execute();
                if (id(cover_art_screensaver_active)) {
                  id(cover_art_show_track_overlay).execute();
                }
              })
          );

          ha_subscribe_attribute(
            cover_entity, std::string("media_duration"),
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef duration) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string value = string_ref_limited(duration, HA_SHORT_STATE_MAX_LEN);
                id(cover_art_media_duration) = value.empty() ? 0.0f : strtof(value.c_str(), nullptr);
                id(cover_art_last_progress_percent) = -1;
                if (id(cover_art_screensaver_active)) id(cover_art_refresh_progress).execute();
              })
          );

          ha_subscribe_attribute(
            cover_entity, std::string("media_position"),
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef position) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string value = string_ref_limited(position, HA_SHORT_STATE_MAX_LEN);
                id(cover_art_media_position) = value.empty() ? 0.0f : strtof(value.c_str(), nullptr);
                auto now = id(panel_time).now();
                id(cover_art_last_position_timestamp) = now.is_valid() ? now.timestamp : 0;
                id(cover_art_last_progress_percent) = -1;
                if (id(cover_art_screensaver_active)) id(cover_art_refresh_progress).execute();
              })
          );

          ha_subscribe_attribute(
            cover_entity, std::string("media_position_updated_at"),
            std::function<void(esphome::StringRef)>(
              [cover_entity](esphome::StringRef updated_at) {
                if (cover_entity != id(cover_art_media_player_entity).state) return;
                std::string value = string_ref_limited(updated_at, HA_STATE_TEXT_MAX_LEN);
                int yr, mo, dy, hr, mn, sc;
                if (sscanf(value.c_str(), "%d-%d-%dT%d:%d:%d", &yr, &mo, &dy, &hr, &mn, &sc) != 6 &&
                    sscanf(value.c_str(), "%d-%d-%d %d:%d:%d", &yr, &mo, &dy, &hr, &mn, &sc) != 6) {
                  return;
                }
                int y = yr;
                int m = mo;
                if (m <= 2) {
                  y--;
                  m += 12;
                }
                long days = 365L * y + y / 4 - y / 100 + y / 400 + (153 * (m - 3) + 2) / 5 + dy - 719469;
                id(cover_art_position_anchor_epoch) = (int)(days * 86400L + hr * 3600 + mn * 60 + sc);
                id(cover_art_last_position_timestamp) = id(cover_art_position_anchor_epoch);
                id(cover_art_last_progress_percent) = -1;
                if (id(cover_art_screensaver_active)) id(cover_art_refresh_progress).execute();
              })
          );

  - id: cover_art_playback_started
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(cover_art_open_media_subpage_enabled).state &&
                     !id(cover_art_media_subpage_opened);
          then:
            - lambda: |-
                std::string target = id(cover_art_media_subpage_target).state;
                bool opened = target.empty()
                  ? navigation_open_first_kind("media", id(main_page)->obj)
                  : espcontrol_navigate(target, id(main_page)->obj);
                if (opened) {
                  id(cover_art_media_subpage_opened) = true;
                }
      - if:
          condition:
            lambda: |-
              return id(cover_art_screensaver_enabled).state &&
                     !id(cover_art_media_player_entity).state.empty();
          then:
            - script.execute: cover_art_delay_timer

  - id: cover_art_playback_stopped
    mode: restart
    then:
      - globals.set:
          id: cover_art_media_playing
          value: 'false'
      - globals.set:
          id: cover_art_media_subpage_opened
          value: 'false'
      - lambda: |-
          id(cover_art_media_position) = 0.0f;
          id(cover_art_media_duration) = 0.0f;
          id(cover_art_position_anchor_epoch) = 0;
          id(cover_art_last_position_timestamp) = 0;
          id(cover_art_last_progress_percent) = -1;
          lv_bar_set_value(id(cover_art_progress_bar), 0, LV_ANIM_OFF);
          lv_label_set_text(id(cover_art_time_label), "0:00  /  0:00");
      - script.execute: hide_cover_art_view
