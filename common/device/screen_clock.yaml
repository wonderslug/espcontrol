# =============================================================================
# CLOCK SCREENSAVER - Full-screen clock overlay for idle display
# =============================================================================
# Black overlay with a large thin-font time label. Hidden by default; shown
# by backlight.yaml when the clock screensaver is enabled and the idle
# timeout fires. The label is positioned absolutely so the interval can
# drift it for burn-in prevention.
# =============================================================================

font:
  - file: "gfonts://Roboto@Thin"
    id: clock_screensaver_font
    size: ${clock_font_size}
    bpp: 4
    glyphs: " 0123456789:"

  - file: "gfonts://Roboto@Thin"
    id: clock_screensaver_ampm_font
    size: ${clock_ampm_font_size}
    bpp: 4
    glyphs: "AMP "

lvgl:
  top_layer:
    widgets:
      - obj:
          id: clock_screensaver
          x: 0
          y: 0
          width: ${screen_width}
          height: ${screen_height}
          bg_color: 0x000000
          bg_opa: 100%
          radius: 0
          border_width: 0
          pad_all: 0
          scrollable: false
          scrollbar_mode: "off"
          clickable: true
          hidden: true
          widgets:
            - label:
                id: clock_label
                text_font: clock_screensaver_font
                text_color: 0xFFFFFF
                text: "00:00"
            - label:
                id: am_pm_label
                text_font: clock_screensaver_ampm_font
                text_color: 0xFFFFFF
                text: "AM"
                hidden: true
