# =============================================================================
# BUILD PROFILE - Guition ESP32-P4 JC1060P470 (7" landscape)
# =============================================================================
# CI/local build entry point. Includes the full device package and adds
# MAC suffix for unique naming. Used by the release workflow; the .factory
# variant bundles the web UI JS inline for initial flash images.
# =============================================================================

substitutions:
  name: "espcontrol-jc1060p470"
  friendly_name: "EspControl 7inch"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/guition-esp32-p4-jc1060p470/packages.yaml

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
