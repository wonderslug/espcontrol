# =============================================================================
# FACTORY BUILD - Guition ESP32-S3-4848S040 (4" square)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  name: "espcontrol-4848s040"
  friendly_name: "Guition ESP32-S3-4848S040"
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include ../devices/guition-esp32-s3-4848s040/packages.yaml

esphome:
  name_add_mac_suffix: true
  project:
    name: wonderslug.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://wonderslug/espcontrol/devices/guition-esp32-s3-4848s040/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/guition-esp32-s3-4848s040/www.js"

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
