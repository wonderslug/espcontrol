# =============================================================================
# FACTORY BUILD - Guition ESP32-P4 JC8012P4A1 (10.1" landscape)
# =============================================================================
# Factory image: web UI assets (www.js + fonts/icons) are fully embedded in
# flash by the web_server_idf component, so the web UI works on first boot.
# firmware_version is overridden by the release workflow at build time.
# dashboard_import enables one-click adoption in ESPHome Dashboard.
# =============================================================================

substitutions:
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include guition-esp32-p4-jc8012p4a1.yaml

esphome:
  project:
    name: wonderslug.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://wonderslug/espcontrol/devices/guition-esp32-p4-jc8012p4a1/esphome.yaml@main
