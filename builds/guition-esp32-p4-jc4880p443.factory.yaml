# =============================================================================
# FACTORY BUILD - Guition ESP32-P4 JC4880P443 (4.3" portrait)
# =============================================================================
# Factory image: web UI assets (www.js + fonts/icons) are fully embedded in flash.
# =============================================================================

substitutions:
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include guition-esp32-p4-jc4880p443.yaml

esphome:
  project:
    name: wonderslug.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://wonderslug/espcontrol/devices/guition-esp32-p4-jc4880p443/esphome.yaml@main
