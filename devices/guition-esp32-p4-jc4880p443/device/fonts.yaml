# =============================================================================
# FONTS (DEVICE OVERRIDE) - Font variants for the 480x800 display
# =============================================================================
# Supplements the common fonts with device-specific variants for the main UI.
# The common fonts (icon_font, label_font, etc.) still load for setup screens;
# these _lg variants are referenced by the device theme and LVGL config.
# =============================================================================

font:
  # Main page icons: 44px on the S3 reference scaled for the larger 4.3-inch portrait card grid
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_480
    size: 62
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Climate card icons (25% smaller than main page icons)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: climate_card_icon_font_480
    size: 47
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Button labels (31px)
  - file: "gfonts://Roboto"
    id: label_font_lg
    size: 31
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Climate modal option titles, smaller than the option value line
  - file: "gfonts://Roboto"
    id: climate_option_title_font_lg
    size: 24
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Sensor value large number (62px)
  - file: "gfonts://Roboto@Light"
    id: statistics_font_lg
    size: 62
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large-card sensor values (2.5x the regular sensor value font)
  - file: "gfonts://Roboto@Thin"
    id: statistics_font_lg_xl
    size: 155
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Media now-playing titles (sensor value size, full text glyph coverage)
  - file: "gfonts://Roboto@Light"
    id: media_title_font_lg
    size: 56
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Volume/climate modal: 96px on the S3 reference scaled for the larger 4.3-inch portrait card grid
  - file: "gfonts://Roboto@Thin"
    id: volume_modal_number_font_lg
    size: 135
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Top bar clock and temperature (25px)
  - file: "gfonts://Roboto"
    id: clockbar_font_lg
    size: 25
    bpp: 4
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Top bar network status icon
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: network_status_font_lg
    size: 23
    bpp: 4
    glyphs: !include ../../../common/assets/network_status_glyphs.yaml

  # Setup screen icons: 61px on the S3 reference scaled for the larger 4.3-inch portrait setup layout
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup_480
    size: 86
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F0200"  # mdi-ethernet
      - "\U000F0493"  # mdi-cog
      - "\U000F07D0"  # mdi-home-assistant
