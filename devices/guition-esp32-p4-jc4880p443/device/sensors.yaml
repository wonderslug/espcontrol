# =============================================================================
# SENSORS - Dynamic HA entity subscriptions (P4-4880 - 6 buttons, 2×3 grid)
# =============================================================================
# Thin wiring layer: builds id()-based arrays and calls shared C++ functions
# from button_grid.h for all grid layout, HA subscriptions, and subpage logic.
# This device requires color_correction for accurate display colors.
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'

esphome:
  on_boot:
    - priority: -100
      then:
        # Phase 1: Parse config, position buttons, apply colors/icons/labels
        - lambda: |-
            BtnSlot slots[] = {
              { id(button_1_config), id(button_1), id(button_1_icon_label), id(button_1_text_label), id(button_1_sensor_container), id(button_1_sensor_label), id(button_1_unit_label) },
              { id(button_2_config), id(button_2), id(button_2_icon_label), id(button_2_text_label), id(button_2_sensor_container), id(button_2_sensor_label), id(button_2_unit_label) },
              { id(button_3_config), id(button_3), id(button_3_icon_label), id(button_3_text_label), id(button_3_sensor_container), id(button_3_sensor_label), id(button_3_unit_label) },
              { id(button_4_config), id(button_4), id(button_4_icon_label), id(button_4_text_label), id(button_4_sensor_container), id(button_4_sensor_label), id(button_4_unit_label) },
              { id(button_5_config), id(button_5), id(button_5_icon_label), id(button_5_text_label), id(button_5_sensor_container), id(button_5_sensor_label), id(button_5_unit_label) },
              { id(button_6_config), id(button_6), id(button_6_icon_label), id(button_6_text_label), id(button_6_sensor_container), id(button_6_sensor_label), id(button_6_unit_label) },
            };
            GridConfig cfg = {};
            cfg.num_slots = 6;
            cfg.cols = 2;
            cfg.color_correction = true;
            cfg.sp_sensor_font = id(statistics_font_lg)->get_lv_font();
            grid_phase1(slots, cfg,
              id(button_order).state,
              id(button_on_color).state,
              id(button_off_color).state,
              id(sensor_card_color).state);
        - delay: 100ms

        # Phase 2: HA subscriptions + subpage creation
        - lambda: |-
            BtnSlot slots[] = {
              { id(button_1_config), id(button_1), id(button_1_icon_label), id(button_1_text_label), id(button_1_sensor_container), id(button_1_sensor_label), id(button_1_unit_label) },
              { id(button_2_config), id(button_2), id(button_2_icon_label), id(button_2_text_label), id(button_2_sensor_container), id(button_2_sensor_label), id(button_2_unit_label) },
              { id(button_3_config), id(button_3), id(button_3_icon_label), id(button_3_text_label), id(button_3_sensor_container), id(button_3_sensor_label), id(button_3_unit_label) },
              { id(button_4_config), id(button_4), id(button_4_icon_label), id(button_4_text_label), id(button_4_sensor_container), id(button_4_sensor_label), id(button_4_unit_label) },
              { id(button_5_config), id(button_5), id(button_5_icon_label), id(button_5_text_label), id(button_5_sensor_container), id(button_5_sensor_label), id(button_5_unit_label) },
              { id(button_6_config), id(button_6), id(button_6_icon_label), id(button_6_text_label), id(button_6_sensor_container), id(button_6_sensor_label), id(button_6_unit_label) },
            };
            esphome::text::Text *sp_cfgs[] = {
              id(subpage_1_config), id(subpage_2_config), id(subpage_3_config),
              id(subpage_4_config), id(subpage_5_config), id(subpage_6_config),
            };
            esphome::text::Text *sp_ext[] = {
              id(subpage_1_config_ext), id(subpage_2_config_ext), id(subpage_3_config_ext),
              id(subpage_4_config_ext), id(subpage_5_config_ext), id(subpage_6_config_ext),
            };
            GridConfig cfg = {};
            cfg.num_slots = 6;
            cfg.cols = 2;
            cfg.color_correction = true;
            cfg.sp_sensor_font = id(statistics_font_lg)->get_lv_font();
            grid_phase2(slots, cfg, sp_cfgs, sp_ext,
              id(button_order).state,
              id(button_on_color).state,
              id(button_off_color).state,
              id(sensor_card_color).state,
              id(main_page)->obj);
        - delay: 100ms

        # Phase 3: Temperature + presence subscriptions
        - lambda: |-
            grid_phase3(
              id(indoor_temp_enable).state,
              id(outdoor_temp_enable).state,
              id(indoor_temp_entity).state,
              id(outdoor_temp_entity).state,
              &id(indoor_temp), &id(outdoor_temp),
              id(temperatures),
              id(presence_sensor_entity).state,
              &id(presence_detected),
              []() { id(screensaver_wake).execute(); });
