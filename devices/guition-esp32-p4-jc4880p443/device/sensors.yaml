# =============================================================================
# SENSORS - Dynamic HA entity subscriptions (P4-4880 - 15 buttons, 3×5 grid)
# =============================================================================
# Uses shared C++ from button_grid.h and icons.h for parsing, icon lookup,
# color handling, sensor cards, toggle visuals, and HA subscriptions.
# This device requires color_correction for accurate display colors.
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'

esphome:
  on_boot:
    - priority: -100
      then:
        # Phase 1: Parse config, position buttons, apply colors/icons/labels
        - lambda: |-
            std::string order_check = id(button_order).state;
            if (!order_check.empty()) {
              bool all_empty = true;
              esphome::text::Text *cfgs[] = {
                id(button_1_config), id(button_2_config), id(button_3_config),
                id(button_4_config), id(button_5_config), id(button_6_config),
                id(button_7_config), id(button_8_config), id(button_9_config),
                id(button_10_config), id(button_11_config), id(button_12_config),
                id(button_13_config), id(button_14_config), id(button_15_config),
              };
              for (auto *c : cfgs) { if (!c->state.empty()) { all_empty = false; break; } }
              if (all_empty) {
                ESP_LOGW("sensors", "Button order is set but all configs are empty. "
                  "If upgrading from the old per-field format, export your config "
                  "from the old firmware's web UI and import it after upgrading.");
              }
            }

            static BtnSlot slots[] = {
              { id(button_1_config), id(button_1), id(button_1_icon_label), id(button_1_text_label), id(button_1_sensor_container), id(button_1_sensor_label), id(button_1_unit_label) },
              { id(button_2_config), id(button_2), id(button_2_icon_label), id(button_2_text_label), id(button_2_sensor_container), id(button_2_sensor_label), id(button_2_unit_label) },
              { id(button_3_config), id(button_3), id(button_3_icon_label), id(button_3_text_label), id(button_3_sensor_container), id(button_3_sensor_label), id(button_3_unit_label) },
              { id(button_4_config), id(button_4), id(button_4_icon_label), id(button_4_text_label), id(button_4_sensor_container), id(button_4_sensor_label), id(button_4_unit_label) },
              { id(button_5_config), id(button_5), id(button_5_icon_label), id(button_5_text_label), id(button_5_sensor_container), id(button_5_sensor_label), id(button_5_unit_label) },
              { id(button_6_config), id(button_6), id(button_6_icon_label), id(button_6_text_label), id(button_6_sensor_container), id(button_6_sensor_label), id(button_6_unit_label) },
              { id(button_7_config), id(button_7), id(button_7_icon_label), id(button_7_text_label), id(button_7_sensor_container), id(button_7_sensor_label), id(button_7_unit_label) },
              { id(button_8_config), id(button_8), id(button_8_icon_label), id(button_8_text_label), id(button_8_sensor_container), id(button_8_sensor_label), id(button_8_unit_label) },
              { id(button_9_config), id(button_9), id(button_9_icon_label), id(button_9_text_label), id(button_9_sensor_container), id(button_9_sensor_label), id(button_9_unit_label) },
              { id(button_10_config), id(button_10), id(button_10_icon_label), id(button_10_text_label), id(button_10_sensor_container), id(button_10_sensor_label), id(button_10_unit_label) },
              { id(button_11_config), id(button_11), id(button_11_icon_label), id(button_11_text_label), id(button_11_sensor_container), id(button_11_sensor_label), id(button_11_unit_label) },
              { id(button_12_config), id(button_12), id(button_12_icon_label), id(button_12_text_label), id(button_12_sensor_container), id(button_12_sensor_label), id(button_12_unit_label) },
              { id(button_13_config), id(button_13), id(button_13_icon_label), id(button_13_text_label), id(button_13_sensor_container), id(button_13_sensor_label), id(button_13_unit_label) },
              { id(button_14_config), id(button_14), id(button_14_icon_label), id(button_14_text_label), id(button_14_sensor_container), id(button_14_sensor_label), id(button_14_unit_label) },
              { id(button_15_config), id(button_15), id(button_15_icon_label), id(button_15_text_label), id(button_15_sensor_container), id(button_15_sensor_label), id(button_15_unit_label) },
            };
            static constexpr int NUM_SLOTS = 15;
            static constexpr int COLS = 3;

            OrderResult parsed, order;
            parse_order_string(id(button_order).state, NUM_SLOTS, parsed);
            clear_spanned_cells(parsed, NUM_SLOTS, COLS, order);

            bool has_on, has_off, has_sensor_color;
            uint32_t on_val = parse_hex_color(id(button_on_color).state, has_on);
            uint32_t off_val = parse_hex_color(id(button_off_color).state, has_off);
            uint32_t sensor_val = parse_hex_color(id(sensor_card_color).state, has_sensor_color);

            if (has_on) on_val = correct_color(on_val);
            if (has_off) off_val = correct_color(off_val);
            if (has_sensor_color) sensor_val = correct_color(sensor_val);

            for (int i = 0; i < NUM_SLOTS; i++)
              lv_obj_add_flag(slots[i].btn, LV_OBJ_FLAG_HIDDEN);

            for (int p = 0; p < NUM_SLOTS; p++) {
              int idx = order.positions[p];
              if (idx < 1 || idx > NUM_SLOTS) continue;
              auto &s = slots[idx - 1];
              std::string cfg = s.config->state;
              lv_obj_clear_flag(s.btn, LV_OBJ_FLAG_HIDDEN);
              int col = p % COLS, row = p / COLS;
              int row_span = order.is_double[idx - 1] ? 2 : 1;
              int col_span = order.is_wide[idx - 1] ? 2 : 1;
              lv_obj_set_grid_cell(s.btn,
                LV_GRID_ALIGN_STRETCH, col, col_span,
                LV_GRID_ALIGN_STRETCH, row, row_span);

              apply_button_colors(s.btn, has_on, on_val, has_off, off_val);

              std::string btn_type = cfg_field(cfg, 6);
              if (btn_type == "sensor") {
                std::string sensor_id = cfg_field(cfg, 4);
                if (sensor_id.empty()) continue;
                setup_sensor_card(s, cfg, has_sensor_color, sensor_val);
                continue;
              }
              if (btn_type == "light") {
                setup_light_visual(s, cfg, has_on ? on_val : 0xFF8C00);
              } else {
                setup_toggle_visual(s, cfg);
              }
            }

        - delay: 100ms

        # Phase 2: HA subscriptions + subpage creation
        - lambda: |-
            constexpr int NUM_SLOTS = 15;
            constexpr int COLS = 3;

            static bool has_sensor[NUM_SLOTS] = {};
            static bool has_icon_on[NUM_SLOTS] = {};
            static const char* icon_off_cp[NUM_SLOTS] = {};
            static const char* icon_on_cp[NUM_SLOTS] = {};

            BtnSlot slots[] = {
              { id(button_1_config), id(button_1), id(button_1_icon_label), id(button_1_text_label), id(button_1_sensor_container), id(button_1_sensor_label), id(button_1_unit_label) },
              { id(button_2_config), id(button_2), id(button_2_icon_label), id(button_2_text_label), id(button_2_sensor_container), id(button_2_sensor_label), id(button_2_unit_label) },
              { id(button_3_config), id(button_3), id(button_3_icon_label), id(button_3_text_label), id(button_3_sensor_container), id(button_3_sensor_label), id(button_3_unit_label) },
              { id(button_4_config), id(button_4), id(button_4_icon_label), id(button_4_text_label), id(button_4_sensor_container), id(button_4_sensor_label), id(button_4_unit_label) },
              { id(button_5_config), id(button_5), id(button_5_icon_label), id(button_5_text_label), id(button_5_sensor_container), id(button_5_sensor_label), id(button_5_unit_label) },
              { id(button_6_config), id(button_6), id(button_6_icon_label), id(button_6_text_label), id(button_6_sensor_container), id(button_6_sensor_label), id(button_6_unit_label) },
              { id(button_7_config), id(button_7), id(button_7_icon_label), id(button_7_text_label), id(button_7_sensor_container), id(button_7_sensor_label), id(button_7_unit_label) },
              { id(button_8_config), id(button_8), id(button_8_icon_label), id(button_8_text_label), id(button_8_sensor_container), id(button_8_sensor_label), id(button_8_unit_label) },
              { id(button_9_config), id(button_9), id(button_9_icon_label), id(button_9_text_label), id(button_9_sensor_container), id(button_9_sensor_label), id(button_9_unit_label) },
              { id(button_10_config), id(button_10), id(button_10_icon_label), id(button_10_text_label), id(button_10_sensor_container), id(button_10_sensor_label), id(button_10_unit_label) },
              { id(button_11_config), id(button_11), id(button_11_icon_label), id(button_11_text_label), id(button_11_sensor_container), id(button_11_sensor_label), id(button_11_unit_label) },
              { id(button_12_config), id(button_12), id(button_12_icon_label), id(button_12_text_label), id(button_12_sensor_container), id(button_12_sensor_label), id(button_12_unit_label) },
              { id(button_13_config), id(button_13), id(button_13_icon_label), id(button_13_text_label), id(button_13_sensor_container), id(button_13_sensor_label), id(button_13_unit_label) },
              { id(button_14_config), id(button_14), id(button_14_icon_label), id(button_14_text_label), id(button_14_sensor_container), id(button_14_sensor_label), id(button_14_unit_label) },
              { id(button_15_config), id(button_15), id(button_15_icon_label), id(button_15_text_label), id(button_15_sensor_container), id(button_15_sensor_label), id(button_15_unit_label) },
            };

            bool has_on, has_off, has_sensor_color;
            uint32_t on_val = parse_hex_color(id(button_on_color).state, has_on);
            uint32_t off_val = parse_hex_color(id(button_off_color).state, has_off);
            uint32_t sensor_val = parse_hex_color(id(sensor_card_color).state, has_sensor_color);

            if (has_on) on_val = correct_color(on_val);
            if (has_off) off_val = correct_color(off_val);
            if (has_sensor_color) sensor_val = correct_color(sensor_val);

            OrderResult parsed;
            parse_order_string(id(button_order).state, NUM_SLOTS, parsed);

            for (int p = 0; p < NUM_SLOTS; p++) {
              int idx = parsed.positions[p];
              if (idx < 1 || idx > NUM_SLOTS) continue;
              auto &s = slots[idx - 1];
              std::string cfg = s.config->state;

              std::string btn_type = cfg_field(cfg, 6);
              if (btn_type == "sensor") {
                std::string sensor_id = cfg_field(cfg, 4);
                if (sensor_id.empty()) continue;
                subscribe_sensor_value(s.sensor_lbl, sensor_id);
                std::string custom_label = cfg_field(cfg, 1);
                if (custom_label.empty())
                  subscribe_friendly_name(s.text_lbl, sensor_id);
                continue;
              }

              std::string entity_id = cfg_field(cfg, 0);
              if (entity_id.empty()) continue;

              if (btn_type == "light") {
                lv_obj_t *slider = (lv_obj_t *)lv_obj_get_user_data(s.sensor_container);
                subscribe_light_state(s.btn, s.icon_lbl, slider, entity_id);
                std::string custom_label = cfg_field(cfg, 1);
                if (custom_label.empty())
                  subscribe_friendly_name(s.text_lbl, entity_id);
                continue;
              }

              std::string sensor_id = cfg_field(cfg, 4);
              has_sensor[idx - 1] = !sensor_id.empty();

              std::string icon_on_name = cfg_field(cfg, 3);
              has_icon_on[idx - 1] = !icon_on_name.empty() && icon_on_name != "Auto";
              if (has_icon_on[idx - 1])
                icon_on_cp[idx - 1] = find_icon(icon_on_name.c_str());

              std::string icon_name = cfg_field(cfg, 2);
              const char* icon_cp = "\U000F0493";
              if (icon_name.empty() || icon_name == "Auto") {
                icon_cp = domain_default_icon(entity_id.substr(0, entity_id.find('.')));
              } else {
                icon_cp = find_icon(icon_name.c_str());
              }
              icon_off_cp[idx - 1] = icon_cp;

              std::string custom_label = cfg_field(cfg, 1);
              if (custom_label.empty())
                subscribe_friendly_name(s.text_lbl, entity_id);

              subscribe_toggle_state(s.btn, s.icon_lbl, s.sensor_container,
                &has_sensor[idx - 1], &has_icon_on[idx - 1],
                &icon_off_cp[idx - 1], &icon_on_cp[idx - 1], entity_id);

              if (has_sensor[idx - 1])
                subscribe_sensor_value(s.sensor_lbl, sensor_id);
            }

            // --- Subpage creation ---
            static lv_coord_t sp_col_dsc[] = {LV_GRID_FR(1), LV_GRID_FR(1), LV_GRID_FR(1), LV_GRID_TEMPLATE_LAST};
            static lv_coord_t sp_row_dsc[] = {LV_GRID_FR(1), LV_GRID_FR(1), LV_GRID_FR(1), LV_GRID_FR(1), LV_GRID_FR(1), LV_GRID_TEMPLATE_LAST};
            const lv_font_t *sp_icon_fnt = lv_obj_get_style_text_font(slots[0].icon_lbl, LV_PART_MAIN);

            lv_obj_t *ref_btn = slots[0].btn;
            lv_coord_t sp_radius = lv_obj_get_style_radius(ref_btn, LV_PART_MAIN);
            lv_coord_t sp_pad = lv_obj_get_style_pad_top(ref_btn, LV_PART_MAIN);
            const lv_font_t *sp_btn_fnt = lv_obj_get_style_text_font(ref_btn, LV_PART_MAIN);
            lv_color_t sp_txt_color = lv_obj_get_style_text_color(ref_btn, LV_PART_MAIN);

            esphome::text::Text *sp_configs[] = {
              id(subpage_1_config), id(subpage_2_config), id(subpage_3_config),
              id(subpage_4_config), id(subpage_5_config), id(subpage_6_config),
              id(subpage_7_config), id(subpage_8_config), id(subpage_9_config),
              id(subpage_10_config), id(subpage_11_config), id(subpage_12_config),
              id(subpage_13_config), id(subpage_14_config), id(subpage_15_config),
            };
            esphome::text::Text *sp_ext_configs[] = {
              id(subpage_1_config_ext), id(subpage_2_config_ext), id(subpage_3_config_ext),
              id(subpage_4_config_ext), id(subpage_5_config_ext), id(subpage_6_config_ext),
              id(subpage_7_config_ext), id(subpage_8_config_ext), id(subpage_9_config_ext),
              id(subpage_10_config_ext), id(subpage_11_config_ext), id(subpage_12_config_ext),
              id(subpage_13_config_ext), id(subpage_14_config_ext), id(subpage_15_config_ext),
            };

            static int sp_on_count[NUM_SLOTS] = {};

            for (int si = 0; si < NUM_SLOTS; si++) {
              std::string cfg = slots[si].config->state;
              std::string btn_type = cfg_field(cfg, 6);
              if (btn_type != "subpage") continue;
              bool sp_indicator = cfg_field(cfg, 4) == "indicator";

              std::string sp_icon_on_name = cfg_field(cfg, 3);
              bool sp_has_icon_on = !sp_icon_on_name.empty() && sp_icon_on_name != "Auto";
              const char* sp_icon_on_glyph = sp_has_icon_on ? find_icon(sp_icon_on_name.c_str()) : nullptr;
              const char* sp_icon_off_glyph = nullptr;
              if (sp_has_icon_on) {
                std::string sp_icon_off_name = cfg_field(cfg, 2);
                sp_icon_off_glyph = (sp_icon_off_name.empty() || sp_icon_off_name == "Auto")
                  ? "\U000F024B" : find_icon(sp_icon_off_name.c_str());
              }

              std::string sp_cfg = sp_configs[si]->state + sp_ext_configs[si]->state;
              if (sp_cfg.empty()) continue;

              auto sp_btns = parse_subpage_config(sp_cfg);
              if (sp_btns.empty()) continue;
              std::string sp_order_str = get_subpage_order(sp_cfg);

              SubpageOrder sp_ord;
              parse_subpage_order(sp_order_str, NUM_SLOTS, sp_btns.size(), sp_ord);

              lv_obj_t *sub_scr = lv_obj_create(NULL);
              lv_obj_set_style_bg_color(sub_scr, lv_color_black(), LV_PART_MAIN);
              lv_obj_set_style_bg_opa(sub_scr, LV_OPA_COVER, LV_PART_MAIN);
              lv_obj_set_layout(sub_scr, LV_LAYOUT_GRID);
              lv_obj_set_grid_dsc_array(sub_scr, sp_col_dsc, sp_row_dsc);
              lv_obj_set_style_pad_top(sub_scr, 52, LV_PART_MAIN);
              lv_obj_set_style_pad_bottom(sub_scr, 5, LV_PART_MAIN);
              lv_obj_set_style_pad_left(sub_scr, 5, LV_PART_MAIN);
              lv_obj_set_style_pad_right(sub_scr, 5, LV_PART_MAIN);
              lv_obj_set_style_pad_row(sub_scr, 10, LV_PART_MAIN);
              lv_obj_set_style_pad_column(sub_scr, 10, LV_PART_MAIN);
              lv_obj_clear_flag(sub_scr, LV_OBJ_FLAG_SCROLLABLE);

              lv_obj_t *back_btn = lv_btn_create(sub_scr);
              lv_obj_set_style_radius(back_btn, sp_radius, LV_PART_MAIN);
              lv_obj_set_style_pad_all(back_btn, sp_pad, LV_PART_MAIN);
              lv_obj_set_style_text_font(back_btn, sp_btn_fnt, LV_PART_MAIN);
              lv_obj_set_style_text_color(back_btn, sp_txt_color, LV_PART_MAIN);
              lv_obj_set_style_shadow_width(back_btn, 0, LV_PART_MAIN);
              if (has_off) lv_obj_set_style_bg_color(back_btn, lv_color_hex(off_val),
                static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
              lv_obj_set_grid_cell(back_btn, LV_GRID_ALIGN_STRETCH, sp_ord.back_pos % COLS, sp_ord.back_wide ? 2 : 1,
                LV_GRID_ALIGN_STRETCH, sp_ord.back_pos / COLS, sp_ord.back_dbl ? 2 : 1);
              lv_obj_t *bi = lv_label_create(back_btn);
              lv_obj_set_style_text_font(bi, sp_icon_fnt, LV_PART_MAIN);
              lv_label_set_text(bi, "\U000F004D");
              lv_obj_align(bi, LV_ALIGN_TOP_LEFT, 0, 0);
              lv_obj_t *bl = lv_label_create(back_btn);
              lv_label_set_text(bl, "Back");
              lv_obj_align(bl, LV_ALIGN_BOTTOM_LEFT, 0, 0);

              lv_obj_t *main_scr = id(main_page)->obj;
              lv_obj_add_event_cb(back_btn, [](lv_event_t *e) {
                lv_scr_load_anim((lv_obj_t *)lv_event_get_user_data(e), LV_SCR_LOAD_ANIM_NONE, 0, 0, false);
              }, LV_EVENT_CLICKED, main_scr);

              for (int gp = 0; gp < NUM_SLOTS; gp++) {
                int bn = sp_ord.positions[gp];
                if (bn < 1 || bn > (int)sp_btns.size()) continue;
                auto &sb = sp_btns[bn - 1];
                int col, row;
                if (sp_ord.has_back_token) { col = gp % COLS; row = gp / COLS; }
                else { int op = gp + 1; col = op % COLS; row = op / COLS; }
                int rs = sp_ord.is_double[bn - 1] ? 2 : 1;

                lv_obj_t *sb_btn = lv_btn_create(sub_scr);
                lv_obj_set_style_radius(sb_btn, sp_radius, LV_PART_MAIN);
                lv_obj_set_style_pad_all(sb_btn, sp_pad, LV_PART_MAIN);
                lv_obj_set_style_text_font(sb_btn, sp_btn_fnt, LV_PART_MAIN);
                lv_obj_set_style_text_color(sb_btn, sp_txt_color, LV_PART_MAIN);
                lv_obj_set_style_shadow_width(sb_btn, 0, LV_PART_MAIN);
                if (has_off) lv_obj_set_style_bg_color(sb_btn, lv_color_hex(off_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
                if (has_on) lv_obj_set_style_bg_color(sb_btn, lv_color_hex(on_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_CHECKED));
                int cs = sp_ord.is_wide[bn - 1] ? 2 : 1;
                lv_obj_set_grid_cell(sb_btn, LV_GRID_ALIGN_STRETCH, col, cs, LV_GRID_ALIGN_STRETCH, row, rs);

                lv_obj_t *sil = lv_label_create(sb_btn);
                lv_obj_set_style_text_font(sil, sp_icon_fnt, LV_PART_MAIN);
                const char *sic = find_icon(sb.icon.c_str());
                if ((sb.icon.empty() || sb.icon == "Auto") && !sb.entity.empty()) {
                  sic = domain_default_icon(sb.entity.substr(0, sb.entity.find('.')));
                }
                lv_label_set_text(sil, sic);
                lv_obj_align(sil, LV_ALIGN_TOP_LEFT, 0, 0);

                lv_obj_t *stl = lv_label_create(sb_btn);
                lv_obj_align(stl, LV_ALIGN_BOTTOM_LEFT, 0, 0);

                if (sb.type == "sensor") {
                  if (sb.sensor.empty()) continue;
                  if (has_sensor_color)
                    lv_obj_set_style_bg_color(sb_btn, lv_color_hex(sensor_val),
                      static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
                  lv_obj_clear_flag(sb_btn, LV_OBJ_FLAG_CLICKABLE);
                  lv_obj_add_flag(sil, LV_OBJ_FLAG_HIDDEN);

                  lv_obj_t *sc = lv_obj_create(sb_btn);
                  lv_obj_set_align(sc, LV_ALIGN_TOP_LEFT);
                  lv_obj_set_size(sc, LV_SIZE_CONTENT, LV_SIZE_CONTENT);
                  lv_obj_clear_flag(sc, LV_OBJ_FLAG_CLICKABLE | LV_OBJ_FLAG_SCROLLABLE);
                  lv_obj_set_style_bg_opa(sc, LV_OPA_TRANSP, LV_PART_MAIN);
                  lv_obj_set_style_border_width(sc, 0, LV_PART_MAIN);
                  lv_obj_set_style_pad_all(sc, 0, LV_PART_MAIN);
                  lv_obj_set_layout(sc, LV_LAYOUT_FLEX);
                  lv_obj_set_style_flex_flow(sc, LV_FLEX_FLOW_ROW, LV_PART_MAIN);
                  lv_obj_set_style_flex_cross_place(sc, LV_FLEX_ALIGN_END, LV_PART_MAIN);

                  lv_obj_t *svl = lv_label_create(sc);
                  lv_obj_set_style_text_font(svl, id(statistics_font), LV_PART_MAIN);
                  lv_obj_set_style_text_color(svl, sp_txt_color, LV_PART_MAIN);
                  lv_label_set_text(svl, "--");

                  lv_obj_t *sul = lv_label_create(sc);
                  lv_obj_set_style_text_font(sul, sp_btn_fnt, LV_PART_MAIN);
                  lv_obj_set_style_text_color(sul, sp_txt_color, LV_PART_MAIN);
                  lv_obj_set_style_pad_bottom(sul, 6, LV_PART_MAIN);
                  if (!sb.unit.empty())
                    lv_label_set_text(sul, sb.unit.c_str());

                  subscribe_sensor_value(svl, sb.sensor);
                  if (!sb.label.empty()) {
                    lv_label_set_text(stl, sb.label.c_str());
                  } else {
                    subscribe_friendly_name(stl, sb.sensor);
                  }

                } else if (sb.type == "push") {
                  if (!sb.label.empty()) {
                    lv_label_set_text(stl, sb.label.c_str());
                  } else {
                    lv_label_set_text(stl, "Push");
                  }
                  std::string *lbl = new std::string(sb.label.empty() ? "Push" : sb.label);
                  lv_obj_add_event_cb(sb_btn, [](lv_event_t *e) {
                    std::string *label = (std::string *)lv_event_get_user_data(e);
                    api::HomeassistantActionRequest req;
                    req.service = decltype(req.service)("esphome.push_button_pressed");
                    req.is_event = true;
                    req.data.init(1);
                    auto &kv = req.data.emplace_back();
                    kv.key = decltype(kv.key)("label");
                    kv.value = decltype(kv.value)(label->c_str());
                    api::global_api_server->send_homeassistant_action(req);
                  }, LV_EVENT_CLICKED, lbl);

                } else if (sb.type == "light" && !sb.entity.empty()) {
                  if (!sb.label.empty()) {
                    lv_label_set_text(stl, sb.label.c_str());
                  } else {
                    subscribe_friendly_name(stl, sb.entity);
                  }
                  lv_obj_t *sl = setup_light_slider(sb_btn, has_on ? on_val : 0xFF8C00);
                  LightSliderCtx *lctx = new LightSliderCtx();
                  lctx->entity_id = sb.entity;
                  lv_obj_set_user_data(sl, (void *)lctx);
                  lv_obj_add_event_cb(sl, [](lv_event_t *e) {
                    lv_obj_t *s = lv_event_get_target(e);
                    LightSliderCtx *c = (LightSliderCtx *)lv_obj_get_user_data(s);
                    if (c && !c->entity_id.empty())
                      send_light_action(c->entity_id, lv_slider_get_value(s));
                  }, LV_EVENT_RELEASED, nullptr);
                  subscribe_light_state(sb_btn, sil, sl, sb.entity);

                  std::string *eid = new std::string(sb.entity);
                  lv_obj_add_event_cb(sb_btn, [](lv_event_t *e) {
                    std::string *en = (std::string *)lv_event_get_user_data(e);
                    if (en && !en->empty()) send_light_action(*en, -1);
                  }, LV_EVENT_CLICKED, eid);

                } else if (!sb.entity.empty()) {
                  if (!sb.label.empty()) {
                    lv_label_set_text(stl, sb.label.c_str());
                  } else {
                    subscribe_friendly_name(stl, sb.entity);
                  }

                  lv_obj_t *bp = sb_btn;
                  api::global_api_server->subscribe_home_assistant_state(
                    sb.entity, {},
                    std::function<void(const std::string &)>([bp](const std::string &state) {
                      bool on = is_entity_on(state);
                      if (on) lv_obj_add_state(bp, LV_STATE_CHECKED);
                      else lv_obj_clear_state(bp, LV_STATE_CHECKED);
                    })
                  );

                  if (sp_indicator) {
                    lv_obj_t *parent_btn = slots[si].btn;
                    lv_obj_t *parent_icon = slots[si].icon_lbl;
                    int parent_idx = si;
                    bool *child_was_on = new bool(false);
                    bool has_alt_icon = sp_has_icon_on;
                    const char* off_glyph = sp_icon_off_glyph;
                    const char* on_glyph = sp_icon_on_glyph;
                    api::global_api_server->subscribe_home_assistant_state(
                      sb.entity, {},
                      std::function<void(const std::string &)>([parent_btn, parent_icon, parent_idx, child_was_on, has_alt_icon, off_glyph, on_glyph](const std::string &state) {
                        bool is_on = is_entity_on(state);
                        if (is_on && !*child_was_on) {
                          sp_on_count[parent_idx]++;
                          *child_was_on = true;
                        } else if (!is_on && *child_was_on) {
                          sp_on_count[parent_idx]--;
                          *child_was_on = false;
                        }
                        if (sp_on_count[parent_idx] > 0) {
                          lv_obj_add_state(parent_btn, LV_STATE_CHECKED);
                          if (has_alt_icon) lv_label_set_text(parent_icon, on_glyph);
                        } else {
                          lv_obj_clear_state(parent_btn, LV_STATE_CHECKED);
                          if (has_alt_icon) lv_label_set_text(parent_icon, off_glyph);
                        }
                      })
                    );
                  }

                  std::string *eid = new std::string(sb.entity);
                  lv_obj_add_event_cb(sb_btn, [](lv_event_t *e) {
                    std::string *en = (std::string *)lv_event_get_user_data(e);
                    if (en && !en->empty()) send_toggle_action(*en);
                  }, LV_EVENT_CLICKED, eid);
                } else {
                  lv_label_set_text(stl, sb.label.empty() ? "Configure" : sb.label.c_str());
                }
              }

              lv_obj_set_user_data(slots[si].btn, (void *)sub_scr);
            }

        - delay: 100ms

        # Phase 3: Temperature + presence subscriptions
        - lambda: |-
            bool indoor_on  = id(indoor_temp_enable).state;
            bool outdoor_on = id(outdoor_temp_enable).state;

            if (indoor_on && outdoor_on) {
              lv_label_set_text(id(temperatures), "-° / -°");
            } else if (indoor_on || outdoor_on) {
              lv_label_set_text(id(temperatures), "-°");
            }

            if (indoor_on) {
              std::string indoor_id = id(indoor_temp_entity).state;
              if (!indoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  indoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(indoor_temp) = val;
                      float outdoor = id(outdoor_temp);
                      if (std::isnan(outdoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", outdoor, val);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            if (outdoor_on) {
              std::string outdoor_id = id(outdoor_temp_entity).state;
              if (!outdoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  outdoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(outdoor_temp) = val;
                      float indoor = id(indoor_temp);
                      if (std::isnan(indoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", val, indoor);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            std::string presence_id = id(presence_sensor_entity).state;
            if (!presence_id.empty()) {
              api::global_api_server->subscribe_home_assistant_state(
                presence_id, {},
                std::function<void(const std::string &)>([](const std::string &state) {
                  bool detected = (state == "on");
                  id(presence_detected) = detected;
                  if (detected) {
                    lv_disp_trig_activity(NULL);
                    id(screensaver_wake).execute();
                  }
                })
              );
            }
