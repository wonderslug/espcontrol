# =============================================================================
# BUTTON WIDGET - Parameterized LVGL button (included per slot via ${num})
# =============================================================================
# Single button tile for the main page grid. Each button shows an icon (which
# can swap to a different icon or sensor value when the entity is on), a text
# label, and toggles its bound
# Home Assistant entity on press. Hidden by default; sensors.yaml unhides
# and positions active buttons at boot based on button_order.
# =============================================================================

button:
  id: button_${num}
  hidden: true
  styles: control
  widgets:
    # Icon (swaps to icon_on or hides for sensor overlay when entity is on)
    - label:
        text_font: $icon_font
        align: top_left
        id: button_${num}_icon_label
        text: $icon_cog
    # Sensor overlay (replaces icon when entity is on and sensor is configured)
    - obj:
        align: top_left
        id: button_${num}_sensor_container
        height: SIZE_CONTENT
        width: SIZE_CONTENT
        clickable: false
        layout:
          type: flex
          flex_flow: row
          flex_align_cross: end
        bg_opa: TRANSP
        border_width: 0
        pad_all: 0
        hidden: true
        widgets:
          - label:
              text_font: statistics_font
              text_color: $button_text_color
              id: button_${num}_sensor_label
              text: "--"
          - label:
              text_font: label_font_sm
              text_color: $button_text_color
              id: button_${num}_unit_label
              text: ""
              pad_bottom: 6
    # Entity name label (bottom of button, wraps to fit available space)
    - label:
        align: bottom_left
        id: button_${num}_text_label
        text: "Configure"
        long_mode: wrap
        width: 100%
  # Fire push event, navigate to subpage, or toggle the bound HA entity
  on_short_click:
    - lambda: |-
        std::string cfg = id(button_${num}_config).state;
        size_t p = 0;
        for (int i = 0; i < 6; i++) { p = cfg.find(';', p); if (p == std::string::npos) break; p++; }
        size_t e = cfg.find(';', p);
        std::string t = (p != std::string::npos)
          ? ((e == std::string::npos) ? cfg.substr(p) : cfg.substr(p, e - p))
          : "";
        if (t == "push") {
          size_t lp = cfg.find(';');
          std::string label = "";
          if (lp != std::string::npos) {
            size_t le = cfg.find(';', lp + 1);
            label = (le == std::string::npos) ? cfg.substr(lp + 1) : cfg.substr(lp + 1, le - lp - 1);
          }
          if (label.empty()) label = "Push ${num}";
          api::HomeassistantActionRequest req;
          req.service = decltype(req.service)("esphome.push_button_pressed");
          req.is_event = true;
          req.data.init(2);
          auto &kv1 = req.data.emplace_back();
          kv1.key = decltype(kv1.key)("label");
          kv1.value = decltype(kv1.value)(label.c_str());
          auto &kv2 = req.data.emplace_back();
          kv2.key = decltype(kv2.key)("slot");
          kv2.value = decltype(kv2.value)("${num}");
          api::global_api_server->send_homeassistant_action(req);
        } else if (t == "subpage") {
          lv_obj_t *sub_scr = (lv_obj_t *)lv_obj_get_user_data(id(button_${num}));
          if (sub_scr) lv_scr_load_anim(sub_scr, LV_SCR_LOAD_ANIM_NONE, 0, 0, false);
        } else if (t == "sensor") {
          return;
        } else {
          size_t sp = cfg.find(';');
          std::string eid = (sp != std::string::npos) ? cfg.substr(0, sp) : cfg;
          if (!eid.empty()) {
            if (lv_obj_has_state(id(button_${num}), LV_STATE_CHECKED))
              lv_obj_clear_state(id(button_${num}), LV_STATE_CHECKED);
            else
              lv_obj_add_state(id(button_${num}), LV_STATE_CHECKED);
            lv_obj_add_state(id(button_${num}), LV_STATE_USER_1);
            lv_obj_t *guard_btn = id(button_${num});
            lv_timer_create([](lv_timer_t *t) {
              lv_obj_clear_state((lv_obj_t *)t->user_data, LV_STATE_USER_1);
              lv_timer_del(t);
            }, 3000, guard_btn);
            api::HomeassistantActionRequest req;
            req.service = decltype(req.service)("homeassistant.toggle");
            req.is_event = false;
            req.data.init(1);
            auto &kv = req.data.emplace_back();
            kv.key = decltype(kv.key)("entity_id");
            kv.value = decltype(kv.value)(eid.c_str());
            api::global_api_server->send_homeassistant_action(req);
          }
        }
