# =============================================================================
# DEVICE - Guition ESP32-S3-4848S040 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4" square panel.
# Includes the ESP32-S3 SoC (native WiFi), MIPI RGB display, GT911
# capacitive touchscreen, and backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/wonderslug/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # The S3 display stack leaves little internal RAM for HTTPS OTA checks.
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol]
    refresh: 0s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
# ESP32-S3 with octal PSRAM and MIPI RGB display fails to reinitialize
# peripherals after a software reset. A brief deep sleep forces a full
# hardware reset on wake, equivalent to a power cycle. The on_boot
# handler catches USB-triggered and software-triggered resets (the
# latter fired by the "Apply Configuration" restart button); the OTA
# on_end hook catches wireless updates.
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: 700
      then:
        - lambda: |-
            register_internal_relay(
              "relay_1", "Relay 1",
              [=](bool on) {
                if (on) id(relay_1).turn_on();
                else id(relay_1).turn_off();
              },
              [=]() { id(relay_1_push).execute(); },
              [=]() -> bool { return id(relay_1).state; });
            register_internal_relay(
              "relay_2", "Relay 2",
              [=](bool on) {
                if (on) id(relay_2).turn_on();
                else id(relay_2).turn_off();
              },
              [=]() { id(relay_2_push).execute(); },
              [=]() -> bool { return id(relay_2).state; });
            register_internal_relay(
              "relay_3", "Relay 3",
              [=](bool on) {
                if (on) id(relay_3).turn_on();
                else id(relay_3).turn_off();
              },
              [=]() { id(relay_3_push).execute(); },
              [=]() -> bool { return id(relay_3).state; });
    - priority: -100
      then:
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off: display_backlight
    on_end:
      then:
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
  - platform: http_request

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !id(ha_time).now().is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Built-in relays (4848S040C relay variant)
# ---------------------------------------------------------------------------
switch:
  - platform: gpio
    name: Relay 1
    id: relay_1
    icon: mdi:electric-switch
    pin:
      number: GPIO40
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_1", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_1", false);'

  - platform: gpio
    name: Relay 2
    id: relay_2
    icon: mdi:electric-switch
    pin:
      number: GPIO2
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_2", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_2", false);'

  - platform: gpio
    name: Relay 3
    id: relay_3
    icon: mdi:electric-switch
    pin:
      number: GPIO1
      inverted: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'notify_internal_relay_changed("relay_3", true);'
    on_turn_off:
      then:
        - lambda: 'notify_internal_relay_changed("relay_3", false);'

# Momentary relay buttons for push-button/dimmer inputs.
button:
  - platform: template
    name: Relay 1 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_1_push

  - platform: template
    name: Relay 2 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_2_push

  - platform: template
    name: Relay 3 Push
    icon: mdi:gesture-tap-button
    on_press:
      then:
        - script.execute: relay_3_push

# ---------------------------------------------------------------------------
# SPI bus (used by MIPI RGB driver for ST7701S init sequence)
# ---------------------------------------------------------------------------
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    update_interval: 16ms
    transform:
      mirror_x: true
      mirror_y: true
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4" 480x480 MIPI RGB panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: GUITION-4848S040
    id: my_display
    pclk_frequency: 8MHz
    update_interval: never
    auto_clear_enabled: False

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  buffer_size: 25%
  displays: my_display
  rotation: 180
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: relay_1_push
    mode: restart
    then:
      - switch.turn_on: relay_1
      - delay: 200ms
      - switch.turn_off: relay_1

  - id: relay_2_push
    mode: restart
    then:
      - switch.turn_on: relay_2
      - delay: 200ms
      - switch.turn_off: relay_2

  - id: relay_3_push
    mode: restart
    then:
      - switch.turn_on: relay_3
      - delay: 200ms
      - switch.turn_off: relay_3

  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 270
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 0
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 90
                      else:
                        - lvgl.display.set_rotation: 180

select:
  - platform: template
    name: "Screen: Rotation"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - script.execute: apply_screen_rotation
