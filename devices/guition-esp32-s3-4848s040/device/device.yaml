# =============================================================================
# DEVICE - Guition ESP32-S3-4848S040 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4" square panel.
# Includes the ESP32-S3 SoC (native WiFi), MIPI RGB display, GT911
# capacitive touchscreen, and backlight PWM.
# =============================================================================

# ---------------------------------------------------------------------------
# ESP32-S3 platform (ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# ---------------------------------------------------------------------------
# External component (sun_calc.h for on-device sunrise/sunset)
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espcontrol
      ref: main
      path: components
    components: [espcontrol]
    refresh: 0s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# Deep sleep (used by OTA to force a full hardware reset on wake)
# ---------------------------------------------------------------------------
deep_sleep:
  id: ota_reboot
  sleep_duration: 100ms

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
# ESP32-S3 with octal PSRAM and MIPI RGB display fails to reinitialize
# peripherals after a software reset. Deep sleep wake triggers a full
# hardware reset, equivalent to a power cycle.
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off: display_backlight
    on_end:
      then:
        - deep_sleep.enter:
            id: ota_reboot
            sleep_duration: 100ms
  - platform: http_request

# ---------------------------------------------------------------------------
# Home Assistant API
# ---------------------------------------------------------------------------
api:
  reboot_timeout: 0s
  homeassistant_states: true

# ---------------------------------------------------------------------------
# Logging (light component silenced to WARN to reduce noise)
# ---------------------------------------------------------------------------
logger:
  logs:
    light: WARN

# ---------------------------------------------------------------------------
# HTTP client (used by firmware_update.yaml for OTA from GitHub)
# ---------------------------------------------------------------------------
http_request:
  id: http_req
  timeout: 10s

# ---------------------------------------------------------------------------
# Web server (v3 UI with custom JS and sorted config groups)
# ---------------------------------------------------------------------------
web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: https://jtenniswood.github.io/espcontrol/webserver/${device_slug}/www.js
  sorting_groups:
    - id: sg_button
      name: "Button Configuration"
      sorting_weight: 10
    - id: sg_display
      name: "Display Configuration"
      sorting_weight: 20
    - id: sg_brightness
      name: "Brightness"
      sorting_weight: 25
    - id: sg_screensaver
      name: "Screensaver"
      sorting_weight: 30
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40

# ---------------------------------------------------------------------------
# Restart button (triggers reboot to apply config changes)
# ---------------------------------------------------------------------------
button:
  - platform: restart
    name: "Apply Configuration"
    icon: mdi:restart
    entity_category: config

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

# ---------------------------------------------------------------------------
# SPI bus (used by MIPI RGB driver for ST7701S init sequence)
# ---------------------------------------------------------------------------
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    update_interval: 16ms
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4" 480x480 MIPI RGB panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: GUITION-4848S040
    id: my_display
    pclk_frequency: 8MHz
    update_interval: never
    auto_clear_enabled: False
    transform:
      mirror_x: false
      mirror_y: false
