# =============================================================================
# SENSORS - TRMNL e-paper dashboard config subscriptions
# =============================================================================
# Thin wiring layer: builds id()-based arrays and calls the shared button grid
# renderer used by the other devices. TRMNL keeps only a monochrome e-paper
# theme and refresh schedule here.
# =============================================================================

script:
  - id: refresh_button_grid
    then:
      - script.execute: trmnl_sync_dashboard_config

  - id: trmnl_update_clock_bar
    then:
      - lambda: |-
          auto now = id(trmnl_time).now();
          if (now.is_valid()) {
            char time_text[6];
            snprintf(time_text, sizeof(time_text), "%02d:%02d", now.hour, now.minute);
            lv_label_set_text(id(display_time), time_text);
          } else {
            lv_label_set_text(id(display_time), "--:--");
          }
          lv_label_set_text(id(network_status_icon_label), "\U000F0928");

  - id: trmnl_start_display_refreshes
    mode: restart
    then:
      - delay: 75s
      - lambda: |-
          id(trmnl_display_refresh_enabled) = true;
      - script.execute: trmnl_refresh_display_full

  - id: trmnl_refresh_display_when_ready
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(trmnl_display_refresh_enabled);"
          then:
            - script.execute: trmnl_refresh_display_full
          else:
            - script.execute: trmnl_start_display_refreshes

  - id: trmnl_dashboard_config_changed
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("trmnl", "Dashboard card config changed; scheduling e-paper refresh");
      - delay: 3s
      - script.execute: trmnl_sync_dashboard_config
      - script.execute: trmnl_refresh_display_when_ready

  - id: trmnl_dashboard_content_changed
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("trmnl", "Dashboard card content changed; scheduling e-paper refresh");
      - delay: 2s
      - if:
          condition:
            lambda: "return id(trmnl_display_refresh_enabled);"
          then:
            - script.execute: trmnl_refresh_display_partial
          else:
            - script.execute: trmnl_refresh_display_when_ready

  - id: trmnl_sync_dashboard_config
    then:
      - lambda: |-
          set_dashboard_content_changed_callback([]() {
            id(trmnl_dashboard_content_changed).execute();
          });

          #define BTN_SLOT(n) { button_##n##_config, button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_container, button_##n##_sensor_label, button_##n##_unit_label, button_##n##_subpage_label }
          BtnSlot slots[] = {
            BTN_SLOT(1), BTN_SLOT(2), BTN_SLOT(3), BTN_SLOT(4),
            BTN_SLOT(5), BTN_SLOT(6), BTN_SLOT(7), BTN_SLOT(8),
            BTN_SLOT(9), BTN_SLOT(10), BTN_SLOT(11), BTN_SLOT(12),
          };
          #undef BTN_SLOT

          GridConfig cfg = {};
          cfg.num_slots = 12;
          cfg.cols = 4;
          cfg.subpage_chevrons_enabled = false;
          cfg.wrap_tall_labels = true;
          cfg.icon_font = id(font_trmnl_mdi_26_icons)->get_lv_font();
          cfg.sp_sensor_font = id(font_trmnl_value_24)->get_lv_font();
          cfg.sp_large_sensor_font = id(font_trmnl_value_large_80)->get_lv_font();
          cfg.large_sensor_unit_offset_percent = -10;
          cfg.media_title_font = id(font_trmnl_label_14)->get_lv_font();
          cfg.option_select_value_font = id(font_trmnl_value_24)->get_lv_font();
          cfg.volume_number_font = id(font_trmnl_value_24)->get_lv_font();
          cfg.volume_label_font = id(font_trmnl_label_14)->get_lv_font();
          cfg.climate_card_icon_font = id(font_trmnl_mdi_26_icons)->get_lv_font();
          cfg.subpage_chevron_font = id(font_trmnl_label_14)->get_lv_font();
          cfg.climate_option_title_font = id(font_trmnl_label_14)->get_lv_font();
          cfg.climate_option_value_font = id(font_trmnl_label_14)->get_lv_font();
          cfg.temperature_unit = id(temperature_unit_select).current_option();
          cfg.timezone = id(timezone_select).current_option();

          grid_phase1(slots, cfg,
            id(button_order).state,
            id(button_on_color).state,
            id(button_off_color).state,
            id(sensor_card_color).state,
            id(main_page)->obj);
          grid_phase2(slots, cfg,
            nullptr, nullptr, nullptr, nullptr, nullptr, nullptr, nullptr, nullptr,
            id(button_order).state,
            id(button_on_color).state,
            id(button_off_color).state,
            id(sensor_card_color).state,
            id(main_page)->obj);

  - id: trmnl_apply_epaper_theme
    then:
      - lambda: |-
          #define BTN_SLOT(n) { button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_label, button_##n##_unit_label, button_##n##_subpage_label }
          struct ThemeSlot { lv_obj_t *btn; lv_obj_t *icon; lv_obj_t *label; lv_obj_t *value; lv_obj_t *unit; lv_obj_t *subpage; };
          ThemeSlot slots[] = {
            BTN_SLOT(1), BTN_SLOT(2), BTN_SLOT(3), BTN_SLOT(4),
            BTN_SLOT(5), BTN_SLOT(6), BTN_SLOT(7), BTN_SLOT(8),
            BTN_SLOT(9), BTN_SLOT(10), BTN_SLOT(11), BTN_SLOT(12),
          };
          #undef BTN_SLOT
          lv_color_t page_bg = lv_color_hex(0xFFFFFF);
          lv_color_t border = lv_color_hex(0x000000);
          lv_obj_set_style_bg_color(id(main_page)->obj, page_bg, LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(main_page)->obj, LV_OPA_COVER, LV_PART_MAIN);
          for (auto &slot : slots) {
            if (!slot.btn) continue;
            bool active = lv_obj_has_state(slot.btn, LV_STATE_CHECKED);
            lv_color_t bg = lv_color_hex(active ? 0x000000 : 0xFFFFFF);
            lv_color_t fg = lv_color_hex(active ? 0xFFFFFF : 0x000000);
            lv_obj_set_style_bg_color(slot.btn, bg, LV_PART_MAIN);
            lv_obj_set_style_bg_opa(slot.btn, LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_border_color(slot.btn, border, LV_PART_MAIN);
            lv_obj_set_style_border_width(slot.btn, 2, LV_PART_MAIN);
            lv_obj_set_style_radius(slot.btn, 6, LV_PART_MAIN);
            lv_obj_set_style_shadow_width(slot.btn, 0, LV_PART_MAIN);
            lv_obj_set_style_pad_all(slot.btn, 8, LV_PART_MAIN);
            if (slot.icon) lv_obj_set_style_text_color(slot.icon, fg, LV_PART_MAIN);
            if (slot.label) lv_obj_set_style_text_color(slot.label, fg, LV_PART_MAIN);
            if (slot.value) lv_obj_set_style_text_color(slot.value, fg, LV_PART_MAIN);
            if (slot.unit) lv_obj_set_style_text_color(slot.unit, fg, LV_PART_MAIN);
            if (slot.subpage) lv_obj_set_style_text_color(slot.subpage, fg, LV_PART_MAIN);
            lv_obj_clear_flag(slot.btn, LV_OBJ_FLAG_CLICKABLE);
            lv_obj_invalidate(slot.btn);
          }
          lv_obj_set_style_text_color(id(temperatures), lv_color_hex(0x000000), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(display_time), lv_color_hex(0x000000), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(network_status_icon_label), lv_color_hex(0x000000), LV_PART_MAIN);
          lv_obj_set_style_bg_opa(id(network_status_button), LV_OPA_TRANSP, LV_PART_MAIN);
          lv_obj_set_style_border_width(id(network_status_button), 0, LV_PART_MAIN);
          lv_obj_invalidate(id(main_page)->obj);

  - id: trmnl_refresh_display
    mode: restart
    then:
      - script.execute: trmnl_update_clock_bar
      - script.execute: trmnl_apply_epaper_theme
      - lambda: |-
          ESP_LOGI("trmnl", "Starting %s e-paper refresh", id(trmnl_force_full_refresh) ? "full" : "partial");
          if (id(trmnl_force_full_refresh)) {
            id(epaper).set_full_update_every(1);
          } else {
            id(epaper).set_full_update_every(30);
          }
      - delay: 250ms
      - component.update: epaper
      - lambda: |-
          id(epaper).set_full_update_every(30);
          id(trmnl_force_full_refresh) = false;
          ESP_LOGI("trmnl", "Finished e-paper refresh");

  - id: trmnl_refresh_display_full
    mode: restart
    then:
      - lambda: |-
          id(trmnl_force_full_refresh) = true;
      - script.execute: trmnl_refresh_display

  - id: trmnl_refresh_display_partial
    mode: restart
    then:
      - lambda: |-
          id(trmnl_force_full_refresh) = false;
      - script.execute: trmnl_refresh_display

interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: "return id(trmnl_display_refresh_enabled);"
          then:
            - script.execute: trmnl_refresh_display_partial

  - interval: 30min
    then:
      - if:
          condition:
            lambda: "return id(trmnl_display_refresh_enabled);"
          then:
            - script.execute: trmnl_refresh_display_full
