              {"Table",                      "\U000F05BC"},
              {"Television",                 "\U000F0502"},
              {"Thermometer",                "\U000F050F"},
              {"Thermometer Alert",          "\U000F0E01"},
              {"Thermometer High",           "\U000F10C2"},
              {"Thermometer Low",            "\U000F10C3"},
              {"Thermostat",                 "\U000F0393"},
              {"Timer",                      "\U000F051B"},
              {"Toilet",                     "\U000F09AB"},
              {"Transmission Tower",         "\U000F0D3E"},
              {"Trash Can",                  "\U000F0A79"},
              {"Wall Outlet",                "\U000F0427"},
              {"Washer",                     "\U000F072A"},
              {"Water",                      "\U000F058C"},
              {"Water Heater",               "\U000F0F92"},
              {"Water Percent",              "\U000F058E"},
              {"Weather Cloudy",             "\U000F0590"},
              {"Weather Cloudy Alert",       "\U000F0F2F"},
              {"Weather Dust",               "\U000F1B5A"},
              {"Weather Fog",                "\U000F0591"},
              {"Weather Hail",               "\U000F0592"},
              {"Weather Hazy",               "\U000F0F30"},
              {"Weather Hurricane",          "\U000F0898"},
              {"Weather Lightning",          "\U000F0593"},
              {"Weather Lightning Rainy",    "\U000F067E"},
              {"Weather Night",              "\U000F0594"},
              {"Weather Night Cloudy",       "\U000F0F31"},
              {"Weather Partly Cloudy",      "\U000F0595"},
              {"Weather Partly Lightning",   "\U000F0F32"},
              {"Weather Partly Rainy",       "\U000F0F33"},
              {"Weather Partly Snowy",       "\U000F0F34"},
              {"Weather Partly Snowy Rainy", "\U000F0F35"},
              {"Weather Pouring",            "\U000F0596"},
              {"Weather Rainy",              "\U000F0597"},
              {"Weather Snowy",              "\U000F0598"},
              {"Weather Snowy Heavy",        "\U000F0F36"},
              {"Weather Snowy Rainy",        "\U000F067F"},
              {"Weather Sunny",              "\U000F0599"},
              {"Weather Sunny Alert",        "\U000F0F37"},
              {"Weather Sunny Off",          "\U000F14E4"},
              {"Weather Sunset",             "\U000F059A"},
              {"Weather Sunset Down",        "\U000F059B"},
              {"Weather Sunset Up",          "\U000F059C"},
              {"Weather Tornado",            "\U000F0F38"},
              {"Weather Windy",              "\U000F059D"},
              {"Weather Windy Variant",      "\U000F059E"},
              {"Wind Power",                 "\U000F1A88"},
              {"Wind Turbine",               "\U000F0DA5"},
              {"Wind Turbine Alert",         "\U000F19AB"},
              {"Wind Turbine Check",         "\U000F19AC"},
              {"Window",                     "\U000F111C"},
            };
            static constexpr size_t NUM_ICONS = sizeof(icon_entries) / sizeof(icon_entries[0]);

            auto find_icon = [](const char* name) -> const char* {
              for (size_t i = 0; i < NUM_ICONS; i++) {
                if (strcmp(icon_entries[i].name, name) == 0) return icon_entries[i].glyph;
              }
              return "\U000F0493";  // cog fallback
            };

            static bool has_sensor[NUM_SLOTS] = {};
            static bool has_icon_on[NUM_SLOTS] = {};
            static const char* icon_off_cp[NUM_SLOTS] = {};
            static const char* icon_on_cp[NUM_SLOTS] = {};

            int pos = 0;
            for (int idx : order) {
              auto &s = slots[idx - 1];
              lv_obj_clear_flag(s.btn, LV_OBJ_FLAG_HIDDEN);
              lv_obj_move_to_index(s.btn, pos++);

              // Apply colors
              if (has_on) {
                lv_obj_set_style_bg_color(s.btn, lv_color_hex(on_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_CHECKED));
              }
              if (has_off) {
                lv_obj_set_style_bg_color(s.btn, lv_color_hex(off_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
              }

              // Track whether this slot has a sensor-when-on entity
              std::string sensor_id = s.sensor->state;
              has_sensor[idx - 1] = !sensor_id.empty();

              // Track whether this slot has a different icon when on
              std::string icon_on_name = s.icon_on->state;
              has_icon_on[idx - 1] = !icon_on_name.empty() && icon_on_name != "Auto";
              if (has_icon_on[idx - 1]) {
                icon_on_cp[idx - 1] = find_icon(icon_on_name.c_str());
              }

              // Subscribe to HA entity state
              std::string entity_id = s.entity->state;
              if (!entity_id.empty()) {
                // Label: custom or friendly_name fallback
                lv_obj_t *text_lbl = s.text_lbl;
                std::string custom_label = s.label->state;
                if (!custom_label.empty()) {
                  lv_label_set_text(text_lbl, custom_label.c_str());
                } else {
                  api::global_api_server->subscribe_home_assistant_state(
                    entity_id, std::string("friendly_name"),
                    std::function<void(const std::string &)>([text_lbl](const std::string &name) {
                      lv_label_set_text(text_lbl, name.c_str());
                    })
                  );
                }

                // Icon (looked up by name so order of icon_entries[] doesn't matter)
                lv_obj_t *icon_lbl = s.icon_lbl;
                std::string icon_name = s.icon->state;
                const char* icon_cp = "\U000F0493";  // cog fallback
                if (icon_name.empty() || icon_name == "Auto") {
                  std::string domain = entity_id.substr(0, entity_id.find('.'));
                  if      (domain == "light")         icon_cp = "\U000F0335";  // Lightbulb
                  else if (domain == "switch")        icon_cp = "\U000F0654";  // Power Plug
                  else if (domain == "fan")           icon_cp = "\U000F0210";  // Fan
                  else if (domain == "lock")          icon_cp = "\U000F033E";  // Lock
                  else if (domain == "cover")         icon_cp = "\U000F1A2B";  // Blinds Horizontal
                  else if (domain == "climate")       icon_cp = "\U000F001B";  // Air Conditioner
                  else if (domain == "media_player")  icon_cp = "\U000F04C3";  // Speaker
                  else if (domain == "camera")        icon_cp = "\U000F0100";  // Camera
                  else if (domain == "binary_sensor") icon_cp = "\U000F0D91";  // Motion Sensor
                } else {
                  icon_cp = find_icon(icon_name.c_str());
                }
                lv_label_set_text(icon_lbl, icon_cp);
                icon_off_cp[idx - 1] = icon_cp;

                // Set unit label text if configured
                if (has_sensor[idx - 1]) {
                  std::string unit_str = s.sensor_unit->state;
                  if (!unit_str.empty()) {
                    lv_label_set_text(s.unit_lbl, unit_str.c_str());
                  }
                }

                // Checked state subscription (with icon swap or sensor swap)
                lv_obj_t *btn_ptr = s.btn;
                lv_obj_t *sensor_ctr = s.sensor_container;
                bool *slot_has_sensor = &has_sensor[idx - 1];
                bool *slot_has_icon_on = &has_icon_on[idx - 1];
                const char** slot_icon_off = &icon_off_cp[idx - 1];
                const char** slot_icon_on = &icon_on_cp[idx - 1];
                api::global_api_server->subscribe_home_assistant_state(
                  entity_id, {},
                  std::function<void(const std::string &)>([btn_ptr, icon_lbl, sensor_ctr, slot_has_sensor, slot_has_icon_on, slot_icon_off, slot_icon_on](const std::string &state) {
                    bool is_on = state == "on" || state == "open" || state == "playing" ||
                                 state == "home" || state == "unlocked";
                    if (is_on) {
                      lv_obj_add_state(btn_ptr, LV_STATE_CHECKED);
                    } else {
                      lv_obj_clear_state(btn_ptr, LV_STATE_CHECKED);
                    }
                    if (*slot_has_icon_on) {
                      lv_label_set_text(icon_lbl, is_on ? *slot_icon_on : *slot_icon_off);
                    } else if (*slot_has_sensor) {
                      if (is_on) {
                        lv_obj_add_flag(icon_lbl, LV_OBJ_FLAG_HIDDEN);
                        lv_obj_clear_flag(sensor_ctr, LV_OBJ_FLAG_HIDDEN);
                      } else {
                        lv_obj_clear_flag(icon_lbl, LV_OBJ_FLAG_HIDDEN);
                        lv_obj_add_flag(sensor_ctr, LV_OBJ_FLAG_HIDDEN);
                      }
                    }
                  })
                );

                // Sensor value subscription
                if (has_sensor[idx - 1]) {
                  lv_obj_t *sensor_lbl = s.sensor_lbl;
                  api::global_api_server->subscribe_home_assistant_state(
                    sensor_id, {},
                    std::function<void(const std::string &)>([sensor_lbl](const std::string &state) {
                      char *end;
                      float val = strtof(state.c_str(), &end);
                      if (end != state.c_str()) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f", val);
                        lv_label_set_text(sensor_lbl, buf);
                      } else {
                        lv_label_set_text(sensor_lbl, state.c_str());
                      }
                    })
                  );
                }
              }
            }

            // --- Temperature display ---
            bool indoor_on  = id(indoor_temp_enable).state;
            bool outdoor_on = id(outdoor_temp_enable).state;

            if (indoor_on && outdoor_on) {
              lv_label_set_text(id(temperatures), "-° / -°");
              lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            } else if (indoor_on || outdoor_on) {
              lv_label_set_text(id(temperatures), "-°");
              lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            }

            // --- Indoor temperature subscription ---
            if (indoor_on) {
              std::string indoor_id = id(indoor_temp_entity).state;
              if (!indoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  indoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(indoor_temp) = val;
                      float outdoor = id(outdoor_temp);
                      if (std::isnan(outdoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", outdoor, val);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            // --- Outdoor temperature subscription ---
            if (outdoor_on) {
              std::string outdoor_id = id(outdoor_temp_entity).state;
              if (!outdoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  outdoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(outdoor_temp) = val;
                      float indoor = id(indoor_temp);
                      if (std::isnan(indoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", val, indoor);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            // --- Presence sensor subscription ---
            std::string presence_id = id(presence_sensor_entity).state;
            if (!presence_id.empty()) {
              api::global_api_server->subscribe_home_assistant_state(
                presence_id, {},
                std::function<void(const std::string &)>([](const std::string &state) {
                  bool detected = (state == "on");
                  id(presence_detected) = detected;
                  if (detected) {
                    lv_disp_trig_activity(NULL);
                    id(screensaver_wake).execute();
                  }
                })
              );
            }
