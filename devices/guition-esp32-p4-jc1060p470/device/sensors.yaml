              {"Weather Snowy Rainy",        "\U000F067F"},
              {"Weather Sunny",              "\U000F0599"},
              {"Weather Sunny Alert",        "\U000F0F37"},
              {"Weather Sunny Off",          "\U000F14E4"},
              {"Weather Sunset",             "\U000F059A"},
              {"Weather Sunset Down",        "\U000F059B"},
              {"Weather Sunset Up",          "\U000F059C"},
              {"Weather Tornado",            "\U000F0F38"},
              {"Weather Windy",              "\U000F059D"},
              {"Weather Windy Variant",      "\U000F059E"},
              {"Wind Power",                 "\U000F1A88"},
              {"Wind Turbine",               "\U000F0DA5"},
              {"Wind Turbine Alert",         "\U000F19AB"},
              {"Wind Turbine Check",         "\U000F19AC"},
              {"Window",                     "\U000F111C"},
              // --- GENERATED:ICONS END ---
            };
            static constexpr size_t NUM_ICONS = sizeof(icon_entries) / sizeof(icon_entries[0]);

            static auto find_icon = [](const char* name) -> const char* {
              for (size_t i = 0; i < NUM_ICONS; i++) {
                if (strcmp(icon_entries[i].name, name) == 0) return icon_entries[i].glyph;
              }
              return "\U000F0493";
            };

            static bool has_sensor[NUM_SLOTS] = {};
            static bool has_icon_on[NUM_SLOTS] = {};
            static const char* icon_off_cp[NUM_SLOTS] = {};
            static const char* icon_on_cp[NUM_SLOTS] = {};

            for (int p = 0; p < NUM_SLOTS; p++) {
              int idx = positions[p];
              if (idx < 1 || idx > NUM_SLOTS) continue;
              auto &s = slots[idx - 1];
              std::string cfg = s.config->state;
              lv_obj_clear_flag(s.btn, LV_OBJ_FLAG_HIDDEN);
              int col = p % COLS;
              int row = p / COLS;
              int row_span = is_double[idx - 1] ? 2 : 1;
              int col_span = is_wide[idx - 1] ? 2 : 1;
              lv_obj_set_grid_cell(s.btn,
                LV_GRID_ALIGN_STRETCH, col, col_span,
                LV_GRID_ALIGN_STRETCH, row, row_span);

              if (row_span > 1) {
                lv_label_set_long_mode(s.text_lbl, LV_LABEL_LONG_WRAP);
                lv_obj_set_width(s.text_lbl, lv_pct(100));
              }

              if (has_on) {
                lv_obj_set_style_bg_color(s.btn, lv_color_hex(on_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_CHECKED));
              }
              if (has_off) {
                lv_obj_set_style_bg_color(s.btn, lv_color_hex(off_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
              }

              std::string btn_type = cfg_field(cfg, 6);
              if (btn_type == "sensor") {
                std::string sensor_id = cfg_field(cfg, 4);
                if (sensor_id.empty()) continue;
                if (has_sensor_color) {
                  lv_obj_set_style_bg_color(s.btn, lv_color_hex(sensor_val),
                    static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
                }
                lv_obj_clear_flag(s.btn, LV_OBJ_FLAG_CLICKABLE);
                lv_obj_add_flag(s.icon_lbl, LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(s.sensor_container, LV_OBJ_FLAG_HIDDEN);
                std::string unit_str = cfg_field(cfg, 5);
                if (!unit_str.empty()) {
                  lv_label_set_text(s.unit_lbl, unit_str.c_str());
                }
                std::string custom_label = cfg_field(cfg, 1);
                if (!custom_label.empty()) {
                  lv_label_set_text(s.text_lbl, custom_label.c_str());
                }
                continue;
              }

              std::string sensor_id = cfg_field(cfg, 4);
              has_sensor[idx - 1] = !sensor_id.empty();

              std::string icon_on_name = cfg_field(cfg, 3);
              has_icon_on[idx - 1] = !icon_on_name.empty() && icon_on_name != "Auto";
              if (has_icon_on[idx - 1]) {
                icon_on_cp[idx - 1] = find_icon(icon_on_name.c_str());
              }

              std::string entity_id = cfg_field(cfg, 0);
              if (!entity_id.empty()) {
                std::string custom_label = cfg_field(cfg, 1);
                if (!custom_label.empty()) {
                  lv_label_set_text(s.text_lbl, custom_label.c_str());
                }

                std::string icon_name = cfg_field(cfg, 2);
                const char* icon_cp = "\U000F0493";
                if (icon_name.empty() || icon_name == "Auto") {
                  std::string domain = entity_id.substr(0, entity_id.find('.'));
                  // --- GENERATED:DOMAIN_ICONS START ---
                  if      (domain == "light")         icon_cp = "\U000F0335";  // Lightbulb
                  else if (domain == "switch")        icon_cp = "\U000F0654";  // Power Plug
                  else if (domain == "fan")           icon_cp = "\U000F0210";  // Fan
                  else if (domain == "lock")          icon_cp = "\U000F033E";  // Lock
                  else if (domain == "cover")         icon_cp = "\U000F1A2B";  // Blinds Horizontal
                  else if (domain == "climate")       icon_cp = "\U000F001B";  // Air Conditioner
                  else if (domain == "media_player")  icon_cp = "\U000F04C3";  // Speaker
                  else if (domain == "camera")        icon_cp = "\U000F0100";  // Camera
                  else if (domain == "binary_sensor") icon_cp = "\U000F0D91";  // Motion Sensor
                  // --- GENERATED:DOMAIN_ICONS END ---
                } else {
                  icon_cp = find_icon(icon_name.c_str());
                }
                lv_label_set_text(s.icon_lbl, icon_cp);
                icon_off_cp[idx - 1] = icon_cp;

                if (has_sensor[idx - 1]) {
                  std::string unit_str = cfg_field(cfg, 5);
                  if (!unit_str.empty()) {
                    lv_label_set_text(s.unit_lbl, unit_str.c_str());
                  }
                }
              } else {
                std::string custom_label = cfg_field(cfg, 1);
                if (!custom_label.empty()) {
                  lv_label_set_text(s.text_lbl, custom_label.c_str());
                }
                std::string icon_name = cfg_field(cfg, 2);
                if (!icon_name.empty() && icon_name != "Auto") {
                  lv_label_set_text(s.icon_lbl, find_icon(icon_name.c_str()));
                } else if (cfg_field(cfg, 6) == "push") {
                  lv_label_set_text(s.icon_lbl, "\U000F0741");
                  static const lv_style_prop_t push_props[] = {LV_STYLE_BG_COLOR, LV_STYLE_PROP_INV};
