# =============================================================================
# DEVICE - Guition ESP32-P4 JC1060P470 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 7" touch panel.
# Includes the ESP32-P4 main SoC, ESP32-C6 hosted WiFi co-processor, MIPI
# DSI display, GT911 capacitive touchscreen, and backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/wonderslug/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-P4 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
      disable_vfs_support_termios: false
      disable_vfs_support_select: false
      disable_vfs_support_dir: false
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_LOG_DEFAULT_LEVEL: "2"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol]
    refresh: 0s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-Wno-deprecated-declarations"
    build_src_flags:
      - "-Wno-literal-suffix"
  on_boot:
    - priority: -100
      then:
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# ESP32-C6 co-processor (provides WiFi/BLE via SDIO)
# ---------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
  - platform: http_request

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# ---------------------------------------------------------------------------
# Power management (LDO channels for DSI PHY and SD card)
# ---------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: True
  - channel: 4
    id: sd_card_power
    voltage: 2.7V
    adjustable: True

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !id(ha_time).now().is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

i2c_device:
  - id: i2cdev1
    address: 0x18
  - id: i2cdev2
    address: 0x32
  - id: i2cdev3
    address: 0x36
  - id: i2cdev4
    address: 0x40

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (7" 1024x600 MIPI DSI panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    id: my_display
    model: JC1060P470
    color_order: RGB
    reset_pin:
      number: GPIO05
    update_interval: never
    auto_clear_enabled: false

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  displays: my_display
  rotation: 180
  byte_order: little_endian
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "180";'
          then:
            - lvgl.display.set_rotation: 0
          else:
            - lvgl.display.set_rotation: 180

select:
  - platform: template
    name: "Screen: Rotation"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "180"
    on_value:
      then:
        - script.execute: apply_screen_rotation
